<style>
:root{
  --bg:#f2f4f7;--surface:#ffffff;--surface2:#f4f5f8;--surface3:#eaecf0;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#0d0d14;--text2:#5a5a72;--text3:#9898b0;
  --accent:#b07d20;--accent-soft:#c9962a;
  --accent-dim:rgba(201,150,42,0.1);--accent-border:rgba(201,150,42,0.25);
  --green:#1a7a4a;--green-dim:rgba(26,122,74,0.1);--green-border:rgba(26,122,74,0.22);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.1);--red-border:rgba(192,57,43,0.22);
  --blue:#1a6fb5;--blue-dim:rgba(26,111,181,0.1);--blue-border:rgba(26,111,181,0.22);
  --gold-bright:#e8c87a;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --nav-h:54px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#fff;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#app{height:100%;position:relative;background:var(--bg)}
.screen{position:absolute;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--sab));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}

/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sab));background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid rgba(0,0,0,0.1);display:flex;align-items:flex-start;padding-bottom:var(--sab);z-index:100}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px 4px;transition:color .2s}
.nav-btn i{font-size:21px;line-height:1}
.nav-btn span{font-size:10px;font-weight:500}
.nav-btn.active{color:var(--accent-soft)}
.nav-add{position:absolute;right:16px;bottom:calc(var(--nav-h) + var(--sab) + 14px);width:50px;height:50px;border-radius:50%;background:var(--accent-soft);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;box-shadow:0 4px 16px rgba(180,120,20,0.35);z-index:101;transition:transform .15s}
.nav-add:active{transform:scale(.92)}

/* HEADER */
.header{padding:max(1.25rem,calc(var(--sat) + 0.5rem)) 1rem .5rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px;color:var(--text)}
.logo em{color:var(--accent-soft);font-style:normal}
.avatar-btn{background:none;border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;background:var(--accent-dim);border:2px solid var(--accent-soft);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent-soft);font-size:15px;font-family:'DM Sans',sans-serif}

/* SECTIONS */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem .3rem}
.section-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 1rem .75rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-pad{padding:1.25rem}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-gold{background:var(--accent-soft);color:#fff;border-color:transparent;font-weight:600}
.btn-icon{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.pill.seen{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.pill.remove{background:transparent;color:var(--text3);border-color:transparent}

/* INPUT */
input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;width:100%;transition:border-color .2s}
input:focus{border-color:var(--accent-soft)}
input::placeholder{color:var(--text3)}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-gold{background:var(--accent-dim);color:var(--accent-soft)}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-gray{background:var(--surface3);color:var(--text3)}
.tag-blue{background:var(--blue-dim);color:var(--blue)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;padding:.25rem 1rem .6rem;overflow-x:auto}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{padding:8px 18px;font-size:15px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;font-weight:500}
.ftab.active{background:var(--text);color:#fff;border-color:transparent}

/* MOVIE ITEM */
.movie-item{display:flex;gap:13px;align-items:flex-start;padding:14px 1rem;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .12s}
.movie-item:last-child{border-bottom:none}
.movie-item:active{background:var(--surface2)}
.m-poster{border-radius:9px;background:var(--surface3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.m-poster img{width:100%;height:100%;object-fit:cover}
.m-info{flex:1;min-width:0}
.m-title{font-size:16px;font-weight:500;line-height:1.3;color:var(--text)}
.m-year{font-weight:400;color:var(--text2);font-size:14px}
.m-sub{font-size:13px;color:var(--text2);margin-top:3px}
.m-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.m-chevron{color:var(--text3);font-size:16px;flex-shrink:0;align-self:center}

/* DETAIL SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;padding-bottom:max(1.5rem,var(--sab));box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.sheet-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem .75rem;flex-shrink:0}
.sheet-title{font-size:17px;font-weight:500}
.sheet-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sheet-body{overflow-y:auto;flex:1;padding:0 1rem}
.sheet-body::-webkit-scrollbar{display:none}
.sheet-actions{display:flex;gap:8px;flex-wrap:wrap;padding:1rem 1rem 0;flex-shrink:0}

/* SEARCH */
.search-wrap{display:flex;gap:8px;padding:.25rem 1rem 1rem;flex-shrink:0}
.search-wrap input{flex:1;min-width:0;padding-right:40px}
.search-input-wrap{position:relative;flex:1;min-width:0}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface3);border:none;border-radius:50%;width:24px;height:24px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:13px}
.result-item{display:flex;gap:11px;align-items:center;padding:10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;transition:background .1s}
.result-item:active{background:var(--surface2)}
.r-poster{width:40px;height:60px;border-radius:7px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px}
.r-poster img{width:100%;height:100%;object-fit:cover}
.r-info{flex:1;min-width:0}
.r-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-add{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent-soft);font-size:16px;transition:all .2s}

/* SWIPE CARD */
.swipe-stage{position:relative;height:400px;display:flex;align-items:center;justify-content:center;overflow:visible;margin-bottom:.5rem;touch-action:none}
.swipe-card{position:absolute;width:240px;background:var(--surface);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.12);overflow:hidden;cursor:grab;user-select:none;touch-action:none;transition:box-shadow .2s}
.swipe-card.dragging{cursor:grabbing;box-shadow:0 16px 48px rgba(0,0,0,.2)}
.swipe-card-poster{width:240px;height:300px;object-fit:cover;display:block;background:var(--surface3)}
.swipe-card-poster-placeholder{width:240px;height:300px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:60px}
.swipe-card-info{padding:.875rem}
.swipe-card-title{font-size:15px;font-weight:600;line-height:1.3}
.swipe-card-meta{font-size:12px;color:var(--text2);margin-top:3px}
/* Swipe feedback overlays */
.swipe-label{position:absolute;top:20px;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:700;letter-spacing:.5px;opacity:0;transition:opacity .1s;pointer-events:none;z-index:10}
.swipe-label-yes{left:16px;background:#e2f5ec;color:var(--green);border:2px solid var(--green)}
.swipe-label-no{right:16px;background:#fde8e8;color:var(--red);border:2px solid var(--red)}
.swipe-label-watch{top:auto;bottom:20px;left:50%;transform:translateX(-50%);background:#fff8e6;color:var(--accent-soft);border:2px solid var(--accent-soft)}
/* Next card peek */
.swipe-card-next{position:absolute;width:220px;background:var(--surface);border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);overflow:hidden;z-index:-1;transform:scale(0.92) translateY(16px);transition:transform .3s}
.swipe-card-next-poster{width:220px;height:278px;object-fit:cover;display:block;background:var(--surface3)}
.swipe-card-next-placeholder{width:220px;height:278px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:52px}
/* Hint buttons below swipe */
.swipe-hints{display:flex;justify-content:center;align-items:center;gap:2rem;padding:.5rem 0}
.swipe-hint{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text3);font-size:11px;font-weight:500}
.swipe-hint i{font-size:20px}
.p-toggle{display:flex;gap:6px;margin-bottom:1rem}
.p-toggle button{flex:1;padding:9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.p-toggle button.active{background:var(--accent-dim);color:var(--accent-soft);border-color:var(--accent-border)}

/* MOOD GRID */
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.mood-btn{padding:1rem;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s;display:flex;flex-direction:column;gap:5px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mood-btn:active{transform:scale(.97)}
.mood-btn.wide{grid-column:span 2}

/* DISCOVER */
.discover-row{overflow-x:auto;display:flex;gap:12px;padding:.25rem 1rem .75rem}
.discover-row::-webkit-scrollbar{display:none}
.discover-card{flex-shrink:0;width:130px;cursor:pointer;transition:transform .15s}
.discover-card:active{transform:scale(.96)}
.discover-poster{width:130px;height:195px;border-radius:12px;object-fit:cover;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.discover-poster img{width:100%;height:100%;object-fit:cover}
.discover-title{font-size:13px;font-weight:500;margin-top:6px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.discover-rating{font-size:12px;color:var(--text3);margin-top:2px}
.discover-loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:1rem}

/* AUTH */
.auth-screen{position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(2.5rem,calc(var(--sat)+1rem)) 1.25rem 2rem;background:linear-gradient(160deg,#f8f9fc,#eef0f6);-webkit-overflow-scrolling:touch}
.auth-screen::-webkit-scrollbar{display:none}
.auth-logo{font-family:'DM Serif Display',serif;font-size:52px;letter-spacing:-.5px;margin-bottom:.25rem}
.auth-logo em{color:var(--accent-soft);font-style:normal}
.auth-tag{color:var(--text3);font-size:14px;margin-bottom:2.5rem;letter-spacing:.3px}
.auth-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:400px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.atab{flex:1;padding:11px;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.atab.active{color:var(--accent-soft);border-bottom-color:var(--accent-soft)}
.afield{margin-bottom:1.1rem}
.afield label{font-size:14px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
.err{background:var(--red-dim);color:var(--red);border-radius:var(--radius-xs);padding:11px 13px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.suc{background:var(--green-dim);color:var(--green);border-radius:var(--radius-xs);padding:11px 13px;font-size:13px;margin-bottom:1rem}

/* STATS */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1rem}
.stat-box{background:var(--surface2);padding:.875rem .5rem;border-radius:var(--radius-sm);text-align:center;border:0.5px solid var(--border)}
.stat-n{font-size:26px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.3px}

/* MISC */
.avatar{border-radius:50%;background:var(--accent-dim);border:2px solid var(--accent-soft);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent-soft);flex-shrink:0}
.match-card{border:0.5px solid var(--accent-border);background:rgba(201,150,42,0.05)}
.match-item{animation:matchIn .4s ease forwards;opacity:0}
@keyframes matchIn{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.empty{text-align:center;padding:3rem 1rem 2rem;color:var(--text3)}
.empty i{font-size:38px;display:block;margin-bottom:10px;opacity:.3}
.empty p{font-size:14px;line-height:1.6}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent-soft);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:12px 0}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--sab) + 14px);left:50%;transform:translateX(-50%);background:#1a1a24;border:0.5px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 20px;font-size:13px;color:#f0f0f0;z-index:500;pointer-events:none;opacity:0;transition:opacity .22s;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.a2hs{position:fixed;top:max(1rem,calc(var(--sat) + 0.5rem));left:1rem;right:1rem;background:#fff;border:0.5px solid var(--accent-border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:102;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.a2hs-icon{width:40px;height:40px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Serif Display',serif;font-size:16px;color:var(--accent-soft);font-weight:600}
.a2hs-text{flex:1;min-width:0}
.a2hs-title{font-size:13px;font-weight:600}
.a2hs-sub{font-size:11px;color:var(--text2);margin-top:2px}
.a2hs-close{width:26px;height:26px;border-radius:50%;border:none;background:var(--surface2);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
</style>

async function doSearch(){
  const el=document.getElementById('sInput');
  const q=(el?el.value:'').trim();
  const rEl=document.getElementById('searchResults');
  if(!q){if(rEl)rEl.innerHTML='<p style="font-size:13px;color:var(--text3);padding:8px 0">Start typing to search</p>';return;}
  const existing=rEl?.innerHTML||'';
  if(rEl)rEl.innerHTML='<div class="loading-row"><div class="spinner"></div> Searching...</div>'+(existing.includes('result-item')?existing:'');
  try{
    const r=await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US&page=1`);
    const d=await r.json();
    const results=(d.results||[]).slice(0,8).map(m=>({id:String(m.id),title:m.title,year:m.release_date?m.release_date.slice(0,4):'?',poster_path:m.poster_path||null,imdb_rating:m.vote_average?parseFloat(m.vote_average.toFixed(1)):null,plot:m.overview||'',genre:null,director:null,runtime:null}));
    window._searchResults=results;
    const rEl2=document.getElementById('searchResults');
    if(!rEl2)return;
    if(!results.length){rEl2.innerHTML='<p style="font-size:13px;color:var(--text3);padding:10px 0">No results found</p>';return;}
    rEl2.innerHTML=results.map((m,i)=>`
      <div class="result-item" onclick="addByIdx(${i})">
        <div class="r-poster">${m.poster_path?`<img src="https://image.tmdb.org/t/p/w92${esc(m.poster_path)}" loading="lazy">`:'🎬'}</div>
        <div class="r-info">
          <div class="r-title">${esc(m.title)} <span style="font-weight:400;color:var(--text2)">(${esc(m.year)})</span></div>
          <div class="r-meta">${m.imdb_rating?'★ '+m.imdb_rating+'  ':''}${esc((m.plot||'').slice(0,55))}${(m.plot||'').length>55?'...':''}</div>
        </div>
        <div class="r-add" id="radd-${i}"><i class="ti ti-plus"></i></div>
      </div>`).join('');
  }catch(e){const rEl2=document.getElementById('searchResults');if(rEl2)rEl2.innerHTML='<p style="font-size:13px;color:var(--red);padding:10px 0">Search failed</p>';}
}

async function fetchMovieDetails(id){
  try{
    const r=await fetch(`${TMDB_BASE}/movie/${id}?api_key=${TMDB_KEY}&append_to_response=credits`);
    const d=await r.json();
    const dir=(d.credits?.crew||[]).find(c=>c.job==='Director');
    return{id:String(d.id),title:d.title,year:d.release_date?d.release_date.slice(0,4):'?',director:dir?dir.name:null,genre:d.genres?.[0]?.name||null,runtime:d.runtime?`${d.runtime}m`:null,imdb_rating:d.vote_average?parseFloat(d.vote_average.toFixed(1)):null,plot:d.overview||'',poster_path:d.poster_path||null};
  }catch(e){return null;}
}

async function addToWatchlist(movie){
  if(_adding){toast('Please wait...');return;}
  if(S.myMovies.find(w=>w.movie_id===String(movie.id))){toast('Already in your list');return;}
  _adding=true;toast('Adding...');
  try{
    const full=await fetchMovieDetails(movie.id);
    const m=full||movie;
    const finalId=String(m.id);
    const{error:me}=await sb.from('movies').upsert({id:finalId,title:m.title,year:m.year,director:m.director,genre:m.genre,runtime:m.runtime,imdb_rating:m.imdb_rating,plot:m.plot,poster_path:m.poster_path},{onConflict:'id'});
    if(me){toast('Movie error: '+me.message);return;}
    const{data:existing}=await sb.from('watchlist').select('id').eq('user_id',S.user.id).eq('movie_id',finalId).maybeSingle();
    if(existing){toast('Already in your list');return;}
    const{error:we}=await sb.from('watchlist').insert({user_id:S.user.id,movie_id:finalId});
    if(we){toast('Error: '+we.message);return;}
    await loadMyMovies();toast(m.title+' added!');
  }catch(e){toast('Error: '+e.message);}
  finally{_adding=false;}
}

function getSwipePool(mood){
  const all=getAllMovies();
  const genres=mood&&mood!=='any'?MOOD_GENRES[mood]:null;
  if(!genres)return all;
  return all.filter(w=>{const g=w.movie?.genre||'';return genres.some(mg=>g.toLowerCase().includes(mg.toLowerCase()));});
}
function startSwipe(mood){
  S.selectedMood=mood;
  let pool=getSwipePool(mood).filter(w=>S.mySwipes[w.movie_id]===undefined);
  if(pool.length===0){S.mySwipes={};S.partnerSwipes={};pool=getSwipePool(mood);if(pool.length===0){toast('No movies match this mood');return;}toast('All swiped — starting fresh!');}
  S.swipeQueue=[...pool].sort(()=>Math.random()-.5);S.swipeIdx=0;S.swipeStarted=true;render();
  // init swipe gestures after render
  setTimeout(initSwipeGestures,100);
}

// SWIPE GESTURE ENGINE
function initSwipeGestures(){
  const card=document.getElementById('swipeCard');
  if(!card||card._init)return;
  card._init=true;
  const labelYes=document.getElementById('swipeCardYes');
  const labelNo=document.getElementById('swipeCardNo');
  const movieId=card.dataset.movieId;
  let x0=0,y0=0,dx=0,dir=null;

  function show(liked){
    card.style.transform='translateX('+dx+'px) rotate('+(dx*0.07)+'deg)';
    const p=Math.min(Math.abs(dx)/100,1);
    if(liked){
      card.style.boxShadow='0 8px 40px rgba(26,122,74,'+(p*0.6)+')';
      if(labelYes)labelYes.style.opacity=Math.min(1,(dx-20)/60)+'';
      if(labelNo)labelNo.style.opacity='0';
    } else {
      card.style.boxShadow='0 8px 40px rgba(192,57,43,'+(p*0.6)+')';
      if(labelNo)labelNo.style.opacity=Math.min(1,(-dx-20)/60)+'';
      if(labelYes)labelYes.style.opacity='0';
    }
  }
  function reset(){
    card.style.transform='translateX(0) rotate(0deg)';
    card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
    if(labelYes)labelYes.style.opacity='0';
    if(labelNo)labelNo.style.opacity='0';
  }
  function settle(){
    card.style.transition='transform .3s,opacity .3s,box-shadow .2s';
    if(dx>80){card.style.transform='translateX(150%) rotate(15deg)';card.style.opacity='0';setTimeout(function(){doSwipe(movieId,true,false);},280);}
    else if(dx<-80){card.style.transform='translateX(-150%) rotate(-15deg)';card.style.opacity='0';setTimeout(function(){doSwipe(movieId,false,false);},280);}
    else{reset();}
  }

  card.addEventListener('touchstart',function(e){
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;dx=0;dir=null;
    card.style.transition='none';
  },{passive:true});

  card.addEventListener('touchmove',function(e){
    var cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    if(!dir){
      var adx=Math.abs(cx-x0),ady=Math.abs(cy-y0);
      if(adx<8&&ady<8)return;
      dir=adx>ady?'h':'v';
    }
    if(dir==='v')return;
    e.preventDefault();
    dx=cx-x0;
    if(dx>20)show(true);
    else if(dx<-20)show(false);
    else{card.style.transform='translateX('+dx+'px)';card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';if(labelYes)labelYes.style.opacity='0';if(labelNo)labelNo.style.opacity='0';}
  },{passive:false});

  card.addEventListener('touchend',function(){
    if(dir==='h')settle();
  },{passive:true});

  // Mouse for desktop
  card.addEventListener('mousedown',function(e){
    x0=e.clientX;dx=0;dir='h';card.style.transition='none';e.preventDefault();
    function mm(e){dx=e.clientX-x0;if(dx>20)show(true);else if(dx<-20)show(false);else{card.style.transform='translateX('+dx+'px)';card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';if(labelYes)labelYes.style.opacity='0';if(labelNo)labelNo.style.opacity='0';}}
    function mu(){window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);settle();}
    window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
  });
}

// SWIPE GESTURE ENGINE
function initSwipeGestures(){
  const card=document.getElementById('swipeCard');
  if(!card||card._init)return;
  card._init=true;
  const labelYes=document.getElementById(card.id+'LabelYes')||document.getElementById('swipeLabelYes');
  const labelNo=document.getElementById(card.id+'LabelNo')||document.getElementById('swipeLabelNo');
  const movieId=card.dataset.movieId;
  let x0=0,y0=0,dx=0,dir=null;

  card.addEventListener('touchstart',function(e){
    x0=e.touches[0].clientX;
    y0=e.touches[0].clientY;
    dx=0;dir=null;
    card.style.transition='none';
  },{passive:true});

  card.addEventListener('touchmove',function(e){
    const x=e.touches[0].clientX;
    const y=e.touches[0].clientY;
    if(!dir){
      const adx=Math.abs(x-x0),ady=Math.abs(y-y0);
      if(adx<5&&ady<5)return;
      dir=adx>=ady?'h':'v';
    }
    if(dir==='v')return;
    e.preventDefault();
    dx=x-x0;
    card.style.transform='translateX('+dx+'px) rotate('+(dx*0.07)+'deg)';
    if(dx>20){
      card.style.boxShadow='0 8px 40px rgba(26,122,74,'+(Math.min(dx/100,1)*0.6)+')';
      if(labelYes)labelYes.style.opacity=Math.min(1,(dx-20)/60)+'';
      if(labelNo)labelNo.style.opacity='0';
    } else if(dx<-20){
      card.style.boxShadow='0 8px 40px rgba(192,57,43,'+(Math.min(-dx/100,1)*0.6)+')';
      if(labelNo)labelNo.style.opacity=Math.min(1,(-dx-20)/60)+'';
      if(labelYes)labelYes.style.opacity='0';
    } else {
      card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
      if(labelYes)labelYes.style.opacity='0';
      if(labelNo)labelNo.style.opacity='0';
    }
  },{passive:false});

  card.addEventListener('touchend',function(){
    if(dir!=='h')return;
    card.style.transition='transform .3s,opacity .3s,box-shadow .2s';
    if(dx>80){
      card.style.transform='translateX(150%) rotate(15deg)';card.style.opacity='0';
      setTimeout(function(){doSwipe(movieId,true,false);},280);
    } else if(dx<-80){
      card.style.transform='translateX(-150%) rotate(-15deg)';card.style.opacity='0';
      setTimeout(function(){doSwipe(movieId,false,false);},280);
    } else {
      card.style.transform='translateX(0) rotate(0deg)';
      card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
      if(labelYes)labelYes.style.opacity='0';
      if(labelNo)labelNo.style.opacity='0';
    }
  },{passive:true});

  // Desktop mouse
  card.addEventListener('mousedown',function(e){
    x0=e.clientX;dx=0;dir='h';
    card.style.transition='none';
    e.preventDefault();
    function mm(e){
      dx=e.clientX-x0;
      card.style.transform='translateX('+dx+'px) rotate('+(dx*0.07)+'deg)';
      if(dx>20){card.style.boxShadow='0 8px 40px rgba(26,122,74,'+(Math.min(dx/100,1)*0.6)+')';if(labelYes)labelYes.style.opacity=Math.min(1,(dx-20)/60)+'';if(labelNo)labelNo.style.opacity='0';}
      else if(dx<-20){card.style.boxShadow='0 8px 40px rgba(192,57,43,'+(Math.min(-dx/100,1)*0.6)+')';if(labelNo)labelNo.style.opacity=Math.min(1,(-dx-20)/60)+'';if(labelYes)labelYes.style.opacity='0';}
      else{card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';if(labelYes)labelYes.style.opacity='0';if(labelNo)labelNo.style.opacity='0';}
    }
    function mu(){
      window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);
      card.style.transition='transform .3s,opacity .3s,box-shadow .2s';
      if(dx>80){card.style.transform='translateX(150%) rotate(15deg)';card.style.opacity='0';setTimeout(function(){doSwipe(movieId,true,false);},280);}
      else if(dx<-80){card.style.transform='translateX(-150%) rotate(-15deg)';card.style.opacity='0';setTimeout(function(){doSwipe(movieId,false,false);},280);}
      else{card.style.transform='translateX(0) rotate(0deg)';card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';if(labelYes)labelYes.style.opacity='0';if(labelNo)labelNo.style.opacity='0';}
    }
    window.addEventListener('mousemove',mm);
    window.addEventListener('mouseup',mu);
  });
}

// SWIPE GESTURE ENGINE
function initSwipeGestures(){
  const card=document.getElementById('swipeCard');
  if(!card||card._init)return;
  card._init=true;
  const labelYes=document.getElementById(card.id+'LabelYes')||document.getElementById('swipeLabelYes');
  const labelNo=document.getElementById(card.id+'LabelNo')||document.getElementById('swipeLabelNo');
  const movieId=card.dataset.movieId;
  let startX=0,startY=0,curX=0,tracking=false;

  function applyDrag(dx){
    card.style.transform=`translateX(${dx}px) rotate(${dx*0.07}deg)`;
    const p=Math.min(Math.abs(dx)/100,1);
    if(dx>20){
      card.style.boxShadow=`0 8px 40px rgba(26,122,74,${p*0.6})`;
      if(labelYes)labelYes.style.opacity=String(Math.min(1,(dx-20)/60));
      if(labelNo)labelNo.style.opacity='0';
    } else if(dx<-20){
      card.style.boxShadow=`0 8px 40px rgba(192,57,43,${p*0.6})`;
      if(labelNo)labelNo.style.opacity=String(Math.min(1,(-dx-20)/60));
      if(labelYes)labelYes.style.opacity='0';
    } else {
      card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
      if(labelYes)labelYes.style.opacity='0';
      if(labelNo)labelNo.style.opacity='0';
    }
  }

  function settle(){
    card.style.transition='transform .3s,opacity .3s,box-shadow .2s';
    if(curX>80){
      card.style.transform='translateX(150%) rotate(15deg)';card.style.opacity='0';
      setTimeout(()=>doSwipe(movieId,true,false),280);
    } else if(curX<-80){
      card.style.transform='translateX(-150%) rotate(-15deg)';card.style.opacity='0';
      setTimeout(()=>doSwipe(movieId,false,false),280);
    } else {
      card.style.transform='translateX(0) rotate(0deg)';
      card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
      if(labelYes)labelYes.style.opacity='0';
      if(labelNo)labelNo.style.opacity='0';
    }
  }

  // Use the stage as the touch target so we get all touch events
  const stage=document.getElementById('swipeStage')||card;

  stage.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startX=t.clientX;startY=t.clientY;curX=0;tracking=true;
    card.style.transition='none';
  },{passive:true});

  stage.addEventListener('touchmove',e=>{
    if(!tracking)return;
    const t=e.touches[0];
    const dx=t.clientX-startX;
    const dy=t.clientY-startY;
    if(Math.abs(dy)>Math.abs(dx)*1.5&&Math.abs(dy)>10){tracking=false;return;}
    e.preventDefault();
    curX=dx;
    applyDrag(curX);
  },{passive:false});

  stage.addEventListener('touchend',e=>{
    if(!tracking)return;
    tracking=false;
    settle();
  },{passive:true});

  stage.addEventListener('touchcancel',e=>{
    tracking=false;
    card.style.transition='transform .3s';
    card.style.transform='translateX(0) rotate(0deg)';
    card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
    if(labelYes)labelYes.style.opacity='0';
    if(labelNo)labelNo.style.opacity='0';
  },{passive:true});

  // Mouse for desktop
  card.addEventListener('mousedown',e=>{
    startX=e.clientX;curX=0;tracking=true;
    card.style.transition='none';
    e.preventDefault();
    function mm(e){if(!tracking)return;curX=e.clientX-startX;applyDrag(curX);}
    function mu(){if(!tracking)return;tracking=false;window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);settle();}
    window.addEventListener('mousemove',mm);
    window.addEventListener('mouseup',mu);
  });
}

  function start(e){
    active=true;startX=getX(e);curX=0;
    card.style.transition='none';
  }
  function move(e){
    if(!active)return;
    if(e.cancelable)e.preventDefault();
    curX=getX(e)-startX;
    card.style.transform=`translateX(${curX}px) rotate(${curX*0.07}deg)`;
    const p=Math.min(Math.abs(curX)/100,1);
    if(curX>20){
      card.style.boxShadow=`0 8px 40px rgba(26,122,74,${p*0.6})`;
      if(labelYes)labelYes.style.opacity=String(Math.min(1,(curX-20)/60));
      if(labelNo)labelNo.style.opacity='0';
    } else if(curX<-20){
      card.style.boxShadow=`0 8px 40px rgba(192,57,43,${p*0.6})`;

      if(labelYes)labelYes.style.opacity='0';
    } else {
      card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
      if(labelYes)labelYes.style.opacity='0';
      if(labelNo)labelNo.style.opacity='0';
    }
  }
  function end(){
    if(!active)return;
    active=false;
    card.style.transition='transform .3s,opacity .3s,box-shadow .2s';

      card.style.transform='translateX(150%) rotate(15deg)';
      card.style.opacity='0';
      setTimeout(()=>doSwipe(movieId,true,false),280);
    } else if(curX<-80){
      card.style.transform='translateX(-150%) rotate(-15deg)';
      card.style.opacity='0';
      setTimeout(()=>doSwipe(movieId,false,false),280);
    } else {
      card.style.transform='translateX(0) rotate(0deg)';
      card.style.boxShadow='0 8px 32px rgba(0,0,0,.12)';
      if(labelYes)labelYes.style.opacity='0';
      if(labelNo)labelNo.style.opacity='0';
    }
  }

  // Touch events
  card.addEventListener('touchstart',start,{passive:true});
  card.addEventListener('touchmove',move,{passive:false});
  card.addEventListener('touchend',end,{passive:true});

  // Mouse events for desktop
  card.addEventListener('mousedown',e=>{start(e);
    function mm(e){move(e);}
    function mu(){end();window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);}
    window.addEventListener('mousemove',mm);
    window.addEventListener('mouseup',mu);
  });
}

      fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&sort_by=vote_average.desc&vote_count.gte=100&primary_release_year=2026&language=en-US`),
      fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&sort_by=vote_average.desc&vote_count.gte=500&primary_release_year=2025&language=en-US`),
      fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&sort_by=vote_average.desc&vote_count.gte=1000&primary_release_year=2024&language=en-US`),
      fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&sort_by=vote_average.desc&vote_count.gte=5000&with_genres=18&language=en-US`),
      fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&sort_by=vote_average.desc&vote_count.gte=5000&with_genres=28&language=en-US`),
      fetch(`${TMDB_BASE}/discover/movie?api_key=${TMDB_KEY}&sort_by=vote_average.desc&vote_count.gte=2000&with_genres=878&language=en-US`),
    ]);
    const [d1,d2,d3,d4,d5,d6]=await Promise.all([r1.json(),r2.json(),r3.json(),r4.json(),r5.json(),r6.json()]);
    S.discoverData={
      'Best of 2026':(d1.results||[]).slice(0,10),
      'Best of 2025':(d2.results||[]).slice(0,10),
      'Best of 2024':(d3.results||[]).slice(0,10),
      'Top Drama':(d4.results||[]).slice(0,10),
      'Top Action':(d5.results||[]).slice(0,10),
      'Top Sci-Fi':(d6.results||[]).slice(0,10),
    };
    // For You
    if(S.myMovies.length>0){
      const randomMovie=S.myMovies[Math.floor(Math.random()*Math.min(S.myMovies.length,5))];
      const r7=await fetch(`${TMDB_BASE}/movie/${randomMovie.movie_id}/recommendations?api_key=${TMDB_KEY}&language=en-US`);
      const d7=await r7.json();
      if(d7.results?.length>0)S.discoverData['For You']=(d7.results||[]).slice(0,10);
    }
  }catch(e){console.error('discover error',e);}
  S.discoverLoading=false;render();
}

function swipeCardHTML(cur, next, cardId, movieId, idx, total, tapFn){

    : `<div class="swipe-card-next-placeholder">🎬</div>`;

    <div class="swipe-stage">

      <div class="swipe-card" id="${cardId}" data-movie-id="${movieId}">

    </div>
    <div class="card card-pad">
      <div style="font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--text3);text-transform:uppercase;margin-bottom:.75rem">Partner</div>
      ${hasPartner?`
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar" style="width:38px;height:38px;font-size:14px">${(pName||'?')[0].toUpperCase()}</div>
          <div><div style="font-weight:500">@${esc(pName||'')}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Connected · ${S.partnerMovies.length} movies</div></div>
        </div>
      `:S.playlist?`
        <p style="font-size:13px;color:var(--text2);margin-bottom:.75rem">Single phone mode.</p>
        <div style="display:flex;gap:8px;margin-bottom:.75rem">
          <input type="text" id="pNameInput" value="${esc(S.partnerName)}" placeholder="Partner name...">
          <button class="btn btn-gold" style="padding:8px 14px;font-size:13px;flex-shrink:0" onclick="savePartnerName()">Save</button>
        </div>
        <button class="btn" style="font-size:13px" onclick="openModal('partner')"><i class="ti ti-user-plus"></i> Connect partner account</button>
      `:`
        <p style="font-size:13px;color:var(--text2);margin-bottom:.75rem">No partner connected.</p>
        <button class="btn btn-gold" style="font-size:13px" onclick="openModal('partner')"><i class="ti ti-user-plus"></i> Connect partner</button>
      `}
    </div>
    <div style="padding:0 1rem .5rem">
      <button class="btn btn-gold" style="width:100%;justify-content:center;margin-bottom:.75rem" onclick="shareApp()"><i class="ti ti-share"></i> Share CinePair with partner</button>
      <a href="mailto:info@cinepair.com?subject=CinePair Feedback" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px 20px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:DM Sans,sans-serif;font-size:14px;font-weight:500;text-decoration:none;margin-bottom:.75rem;box-sizing:border-box">
        <i class="ti ti-mail"></i> Contact us — info@cinepair.com
      </a>
      <button class="btn" style="width:100%;justify-content:center" onclick="doSignOut()"><i class="ti ti-logout"></i> Sign out</button>
    </div>`;
}

function savePartnerName(){const el=document.getElementById('pNameInput');if(el&&el.value.trim()){S.partnerName=el.value.trim();toast('Saved!');render();}}

function renderAddModal(){
  return`<div class="overlay">
    <div class="sheet" onclick="event.stopPropagation()" style="height:85vh">
      <div class="sheet-drag"></div>
      <div class="sheet-head">
        <div class="sheet-title">Search movies</div>
        <button class="sheet-close" onclick="closeModal()" style="width:40px;height:40px;font-size:19px"><i class="ti ti-x"></i></button>
      </div>
      <div class="search-wrap">
        <div class="search-input-wrap">
          <input type="text" id="sInput" placeholder="Movie title..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearchInput()" onkeydown="if(event.key==='Enter'){clearTimeout(_searchTimer);doSearch()}">
          <button onclick="clearSearch()" id="clearBtn" class="search-clear"><i class="ti ti-x"></i></button>
        </div>
      </div>
      <div class="sheet-body" id="searchResults">
        <p style="font-size:13px;color:var(--text3);padding:8px 0">Start typing to search</p>
      </div>
    </div>
  </div>`;
}

function renderPartnerModal(){
  return`<div class="overlay">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-drag"></div>
      <div class="sheet-head">
        <div class="sheet-title">Connect partner account</div>
        <button class="sheet-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="sheet-body">
        <p style="font-size:14px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Your partner needs their own CinePair account. Once connected, their movies appear in the swipe pool automatically.</p>
        <div style="display:flex;gap:8px;margin-bottom:1rem">
          <input type="text" id="pInput" placeholder="their_username" value="${esc(S.partnerQ)}" oninput="S.partnerQ=this.value" autocomplete="off" onkeydown="if(event.key==='Enter')doPartnerSearch()" style="flex:1;min-width:0">
          <button class="btn btn-gold" style="flex-shrink:0" onclick="doPartnerSearch()">Find</button>
        </div>
        ${S.partnerMsg?`<div class="err">${esc(S.partnerMsg)}</div>`:''}
        ${S.partnerResult?`
          <div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface2);padding:13px;border-radius:var(--radius-sm)">
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar" style="width:36px;height:36px;font-size:14px">${S.partnerResult.username[0].toUpperCase()}</div>
              <div style="font-weight:500">@${esc(S.partnerResult.username)}</div>
            </div>
            <button class="btn btn-gold" style="padding:8px 16px;font-size:13px" onclick="createPlaylistWith('${S.partnerResult.id}')">Connect</button>
          </div>
        `:''}
      </div>
    </div>
  </div>`;
}

function renderA2hs(){
  if(isStandalone())return'';
  if(isIOS()&&!localStorage.getItem('a2hs_dismissed'))return`<div class="a2hs">
    <div class="a2hs-icon">CP</div>
    <div class="a2hs-text">
      <div class="a2hs-title">Install CinePair</div>
      <div class="a2hs-sub">In Safari: tap Share ⬆ then "Add to Home Screen"</div>
    </div>
    <button class="a2hs-close" onclick="dismissA2hs()"><i class="ti ti-x"></i></button>
  </div>`;
  if(S.showA2hs)return`<div class="a2hs">
    <div class="a2hs-icon">CP</div>
    <div class="a2hs-text">
      <div class="a2hs-title">Install CinePair</div>
      <div class="a2hs-sub">Add to your home screen</div>
    </div>
    <button class="btn btn-gold" style="padding:6px 12px;font-size:12px;flex-shrink:0" onclick="triggerA2hs()">Install</button>
    <button class="a2hs-close" onclick="dismissA2hs()"><i class="ti ti-x"></i></button>
  </div>`;
  return'';
}

function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=renderAuth();hideSplash();return;}
  const tabs=[
    {id:'my',icon:'ti-list',label:'My list'},
    {id:'partner',icon:'ti-user-heart',label:'Partner'},
    {id:'swipe',icon:'ti-cards',label:'Swipe'},
    {id:'discover',icon:'ti-compass',label:'Discover'},
    {id:'profile',icon:'ti-user',label:'Profile'},
  ];
  let content='';
  if(S.tab==='my')content=renderMy();
  else if(S.tab==='partner')content=renderPartner();
  else if(S.tab==='swipe')content=renderSwipe();
  else if(S.tab==='discover')content=renderDiscover();
  else content=renderProfile();
  const nav=`<nav class="nav">${tabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}"></i><span>${t.label}</span></button>`).join('')}</nav>${S.tab==='my'?`<button class="nav-add" onclick="openModal('add')"><i class="ti ti-plus"></i></button>`:''}`;
  let modal='';
  if(S.modal==='add')modal=renderAddModal();
  else if(S.modal==='partner')modal=renderPartnerModal();
  const detail=S.detail?renderDetail():'';
  const a2hs=renderA2hs();
  app.innerHTML=`<div class="screen">${content}</div>${nav}${modal}${detail}${a2hs}`;
  hideSplash();
  if(S.modal==='add')setTimeout(()=>{document.getElementById('sInput')?.focus();},80);
  if(S.modal==='partner')setTimeout(()=>{document.getElementById('pInput')?.focus();},80);
  if(S.tab==='swipe'&&S.swipeStarted){setTimeout(initSwipeGestures,150);}
}

// GLOBALS
window.shareApp=async function(){
  const text='Join me on CinePair!\n\nMy username: @'+(S.profile?.username||'')+'\n\ncinepair.com';
  if(navigator.share){try{await navigator.share({title:'CinePair',text,url:'https://cinepair.com'});}catch(e){}}
  else{navigator.clipboard?.writeText(text).then(()=>toast('Copied to clipboard!'));}
};
window.tapPartnerSwipe=function(movieId,liked){
  var card=document.getElementById('swipeCardP');
  if(card){card.style.transition='transform .3s,opacity .3s';card.style.transform=liked?'translateX(150%) rotate(15deg)':'translateX(-150%) rotate(-15deg)';card.style.opacity='0';setTimeout(function(){doPartnerSwipe(movieId,liked);},280);}
  else{doPartnerSwipe(movieId,liked);}
};
window.tapSwipe=function(movieId,liked){
  var card=document.getElementById('swipeCard');
  if(card){card.style.transition='transform .3s,opacity .3s';card.style.transform=liked?'translateX(150%) rotate(15deg)':'translateX(-150%) rotate(-15deg)';card.style.opacity='0';setTimeout(function(){doSwipe(movieId,liked,false);},280);}
  else{doSwipe(movieId,liked,false);}
};
window.setTab=t=>{
  S.tab=t;
  if(t==='discover'&&Object.keys(S.discoverData).length===0)loadDiscover();
  render();
};
window.setFilter=f=>{S.filter=f;render();};
window.setAuthTab=t=>{S.authTab=t;S.authErr='';S.authOk='';render();};
window.setPartnerView=v=>{S.partnerView=v;render();if(v===false)setTimeout(initSwipeGestures,150);};
window.openModal=m=>{S.modal=m;render();};
window.closeModal=()=>{S.modal=null;render();};
window.openDetail=openDetail;
window.doSearch=doSearch;
window.onSearchInput=onSearchInput;
window.clearSearch=clearSearch;
window.doPartnerSearch=doPartnerSearch;
window.doSignOut=signOut;
window.startSwipe=startSwipe;
window.doSwipe=doSwipe;
window.doPartnerSwipe=doPartnerSwipe;
window.resetSwipes=resetSwipes;
window.addToWatchlist=addToWatchlist;
window.toggleWatched=toggleWatched;
window.removeFromWatchlist=removeFromWatchlist;
window.createPlaylistWith=createPlaylistWith;
window.createSoloPlaylist=createSoloPlaylist;
window.savePartnerName=savePartnerName;
window.dismissA2hs=dismissA2hs;
window.triggerA2hs=triggerA2hs;
window.doSignIn=()=>{
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!email||!pass){S.authErr='Please fill all fields';render();return;}
  signIn(email,pass);
};
window.doSignUp=()=>{
  const user=document.getElementById('aUser')?.value?.trim();
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!user||!email||!pass){S.authErr='Please fill all fields';render();return;}
  if(user.length<3){S.authErr='Username must be at least 3 characters';render();return;}
  signUp(email,pass,user);
};

(async()=>{
  setTimeout(hideSplash,4000);
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){S.user=session.user;await loadProfile();}
  render();
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){S.user=session.user;await loadProfile();render();}
    else if(event==='SIGNED_OUT'){S.user=null;S.profile=null;render();}
  });
  if(isIOS()&&!isStandalone()&&!localStorage.getItem('a2hs_dismissed'))setTimeout(()=>{S.showA2hs=true;render();},3000);
})();
</script>
<script>
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const w=reg.installing;
      w.addEventListener('statechange',()=>{if(w.state==='installed'&&navigator.serviceWorker.controller)window.location.reload();});
    });
  }).catch(()=>{});
}
</script>
</body>
</html>

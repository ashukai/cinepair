<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CinePair">
<meta name="theme-color" content="#0f0f11">
<title>CinePair</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{--bg:#0f0f11;--surface:#1a1a1f;--surface2:#22222a;--surface3:#2a2a35;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0f0;--text2:#9999aa;--text3:#55556a;--accent:#e8c87a;--accent-dim:rgba(232,200,122,0.12);--accent-border:rgba(232,200,122,0.28);--green:#5ecb8a;--green-dim:rgba(94,203,138,0.12);--red:#e87a7a;--red-dim:rgba(232,122,122,0.12);--blue:#7ab8e8;--blue-dim:rgba(122,184,232,0.12);--radius:14px;--radius-sm:9px;--nav-h:64px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px}
#app{height:100%;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:1rem 1rem calc(var(--nav-h) + 1.5rem);-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:0.5px solid var(--border);display:flex;z-index:200;padding-bottom:max(env(safe-area-inset-bottom),0px)}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:color .15s;padding:8px 4px}
.nav-btn i{font-size:22px}
.nav-btn span{font-size:10px;font-weight:500}
.nav-btn.active{color:var(--accent)}
.header{padding:1.25rem 0 .75rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:24px;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.875rem}
.card-title{font-size:17px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#111;border-color:transparent}
.btn-accent:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn-sm:hover{background:var(--surface2);color:var(--text)}
.btn-sm.on{background:var(--blue-dim);color:var(--blue);border-color:rgba(122,184,232,0.22)}
.btn-sm.watched{background:var(--green-dim);color:var(--green);border-color:rgba(94,203,138,0.22)}
.btn-danger{padding:6px 10px;font-size:13px;border-radius:var(--radius-sm);border:none;background:var(--red-dim);color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:4px}
input,select{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;min-width:0}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-amber{background:var(--accent-dim);color:var(--accent)}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-gray{background:var(--surface2);color:var(--text3)}
.tag-blue{background:var(--blue-dim);color:var(--blue)}
.movie-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:0.5px solid var(--border)}
.movie-item:last-child{border-bottom:none}
.poster{border-radius:var(--radius-sm);background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px}
.poster img{width:100%;height:100%;object-fit:cover}
.movie-info{flex:1;min-width:0}
.movie-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.movie-year{font-weight:400;color:var(--text2);font-size:13px}
.movie-meta{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.movie-plot{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.movie-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.5}
.empty p{font-size:14px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 14px;font-size:13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab.active{background:var(--text);color:var(--bg);border-color:transparent;font-weight:500}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:300}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:max(1.5rem,env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.25rem}
.modal-title{font-size:17px;font-weight:500;margin-bottom:1rem}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}

/* SEARCH RESULTS — fixed for mobile, no horizontal scroll */
.result-item{display:flex;gap:10px;align-items:center;padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;width:100%}
.result-item:active{background:var(--surface2)}
.result-poster{width:40px;height:58px;border-radius:6px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.result-poster img{width:100%;height:100%;object-fit:cover}
.result-info{flex:1;min-width:0;overflow:hidden}
.result-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-add{width:36px;height:36px;border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:18px}

.swipe-poster{width:140px;height:210px;border-radius:var(--radius);background:var(--surface2);margin:0 auto 1.25rem;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:64px}
.swipe-poster img{width:100%;height:100%;object-fit:cover}
.progress-wrap{max-width:200px;margin:0 auto .5rem}
.progress-label{font-size:12px;color:var(--text3);margin-bottom:5px;text-align:center}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.swipe-btns{display:flex;justify-content:center;gap:2.5rem;margin-top:1.25rem}
.btn-swipe{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform .12s}
.btn-swipe:active{transform:scale(.9)}
.btn-nope{background:var(--red-dim);color:var(--red)}
.btn-yep{background:var(--green-dim);color:var(--green)}
.partner-toggle{display:flex;gap:6px;margin-bottom:1rem}
.partner-toggle button{flex:1;padding:9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.partner-toggle button.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
.match-banner{border:0.5px solid var(--accent-border);background:rgba(232,200,122,0.05)}

/* AUTH — bigger, more readable */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:2rem 1.25rem;text-align:center}
.auth-logo{font-family:'DM Serif Display',serif;font-size:44px;letter-spacing:-.5px;margin-bottom:.4rem}
.auth-logo span{color:var(--accent)}
.auth-tagline{color:var(--text2);font-size:16px;margin-bottom:2rem}
.auth-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:420px;text-align:left}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.auth-tab{flex:1;padding:12px;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.field{margin-bottom:1.1rem}
.field label{font-size:15px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
.field input{font-size:16px;padding:13px 14px}
.auth-btn{width:100%;justify-content:center;font-size:16px;padding:13px 18px;margin-top:.25rem}
.error-msg{background:var(--red-dim);color:var(--red);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;margin-bottom:1rem;line-height:1.5}
.success-msg{background:var(--green-dim);color:var(--green);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:1rem}
.stat-card{background:var(--surface2);padding:.875rem;border-radius:var(--radius-sm);text-align:center}
.stat-num{font-size:26px;font-weight:600}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:14px;padding:10px 0}
.toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);background:var(--surface3);border:0.5px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:14px;color:var(--text);z-index:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
.avatar{border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent);flex-shrink:0}
@media(min-width:600px){.modal{border-radius:var(--radius);max-width:480px;align-self:center;margin:auto 0}}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://mshcjeibgyhruxddjwxy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zaGNqZWliZ3locnV4ZGRqd3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2Mzc2NDksImV4cCI6MjA5NTIxMzY0OX0.IOijSeR9eCwaQ687VM8OyuGPvKJSN-Z77QxJuFAlAGs';
const TMDB_KEY='413ef3a9eddbeab6950c7464a3654671';
const TMDB_IMG='https://image.tmdb.org/t/p/w185';
const TMDB_BASE='https://api.themoviedb.org/3';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let S={
  user:null,profile:null,tab:'my',
  watchlist:[],togetherMovies:[],playlist:null,
  swipeQueue:[],swipeIndex:0,partnerView:false,
  mySwipes:{},partnerSwipes:{},
  filterWatched:'all',
  showAddModal:false,showPartnerModal:false,
  searchQ:'',searchResults:[],isSearching:false,
  authTab:'login',authLoading:false,authError:'',authSuccess:'',
  partnerUsername:'',partnerSearchResult:null,partnerSearchMsg:'',
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJ(o){return JSON.stringify(o).replace(/"/g,'&quot;');}

// AUTH
async function signUp(email,pass,username){
  S.authLoading=true;S.authError='';render();
  const{data:ex}=await sb.from('profiles').select('id').eq('username',username).maybeSingle();
  if(ex){S.authError='Username already taken';S.authLoading=false;render();return;}
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username}}});
  if(error){S.authError=error.message;S.authLoading=false;render();return;}
  if(data.user){
    // insert profile immediately
    await sb.from('profiles').upsert({id:data.user.id,username},{onConflict:'id'});
    // auto sign in right away
    const{data:sinData,error:sinErr}=await sb.auth.signInWithPassword({email,password:pass});
    if(!sinErr&&sinData.user){
      S.user=sinData.user;
      S.profile={id:sinData.user.id,username};
      await loadWatchlist();
      await loadTogetherPlaylist();
      S.authLoading=false;
      render();
      toast('Welcome to CinePair! 🎬');
      return;
    }
  }
  // fallback if auto-login fails
  S.authSuccess='Account created! Please sign in.';
  S.authTab='login';
  S.authLoading=false;render();
}
async function signIn(email,pass){
  S.authLoading=true;S.authError='';render();
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){S.authError=error.message;S.authLoading=false;render();return;}
  S.user=data.user;
  await loadProfile();
  S.authLoading=false;render();
  toast('Welcome back! 🎬');
}
async function signOut(){
  await sb.auth.signOut();
  Object.assign(S,{user:null,profile:null,watchlist:[],togetherMovies:[],playlist:null,mySwipes:{},partnerSwipes:{},swipeQueue:[],swipeIndex:0});
  render();
}

// DATA
async function loadProfile(){
  if(!S.user)return;
  const{data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile=data;
  await Promise.all([loadWatchlist(),loadTogetherPlaylist()]);
}
async function loadWatchlist(){
  const{data}=await sb.from('watchlist').select('*,movie:movies(*)').eq('user_id',S.user.id).order('added_at',{ascending:false});
  S.watchlist=data||[];
}
async function loadTogetherPlaylist(){
  const{data}=await sb.from('together_playlists')
    .select('*,owner:profiles!together_playlists_owner_id_fkey(username),partner:profiles!together_playlists_partner_id_fkey(username)')
    .or(`owner_id.eq.${S.user.id},partner_id.eq.${S.user.id}`)
    .order('created_at',{ascending:false}).limit(1).maybeSingle();
  S.playlist=data;
  if(data){await loadTogetherMovies();await loadSwipes();}
}
async function loadTogetherMovies(){
  if(!S.playlist)return;
  const{data}=await sb.from('together_movies').select('*,movie:movies(*)').eq('playlist_id',S.playlist.id).order('added_at',{ascending:false});
  S.togetherMovies=data||[];
}
async function loadSwipes(){
  if(!S.playlist)return;
  const{data}=await sb.from('swipes').select('*').eq('playlist_id',S.playlist.id);
  S.mySwipes={};S.partnerSwipes={};
  (data||[]).forEach(sw=>{
    if(sw.user_id===S.user.id)S.mySwipes[sw.movie_id]=sw.liked;
    else S.partnerSwipes[sw.movie_id]=sw.liked;
  });
}

// TMDB
async function searchTMDB(query){
  if(!query.trim())return;
  S.isSearching=true;S.searchResults=[];render();
  try{
    const r=await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=en-US&page=1`);
    const d=await r.json();
    S.searchResults=(d.results||[]).slice(0,6).map(m=>({
      id:String(m.id),title:m.title,
      year:m.release_date?m.release_date.slice(0,4):'?',
      poster_path:m.poster_path||null,
      imdb_rating:m.vote_average?parseFloat(m.vote_average.toFixed(1)):null,
      plot:m.overview||'',genre:null,director:null,runtime:null
    }));
  }catch(e){S.searchResults=[];}
  S.isSearching=false;render();
}
async function fetchMovieDetails(id){
  try{
    const r=await fetch(`${TMDB_BASE}/movie/${id}?api_key=${TMDB_KEY}&append_to_response=credits`);
    const d=await r.json();
    const dir=(d.credits?.crew||[]).find(c=>c.job==='Director');
    return{
      id:String(d.id),title:d.title,
      year:d.release_date?d.release_date.slice(0,4):'?',
      director:dir?dir.name:null,
      genre:d.genres?.[0]?.name||null,
      runtime:d.runtime?`${d.runtime}m`:null,
      imdb_rating:d.vote_average?parseFloat(d.vote_average.toFixed(1)):null,
      plot:d.overview||'',poster_path:d.poster_path||null
    };
  }catch(e){return null;}
}

// MOVIE ACTIONS
async function addToWatchlist(movie){
  if(S.watchlist.find(w=>w.movie_id===movie.id)){toast('Already in your list');return;}
  try{
    // fetch full details first
    const full=await fetchMovieDetails(movie.id);
    const m=full||movie;
    // upsert movie — ignore if already exists
    const{error:me}=await sb.from('movies').upsert({
      id:m.id,title:m.title,year:m.year,director:m.director,
      genre:m.genre,runtime:m.runtime,imdb_rating:m.imdb_rating,
      plot:m.plot,poster_path:m.poster_path
    },{onConflict:'id'});
    if(me){console.error('movie upsert error',me);}
    // add to watchlist
    const{error:we}=await sb.from('watchlist').insert({user_id:S.user.id,movie_id:m.id});
    if(we){
      console.error('watchlist insert error',we);
      toast('Could not save — try again');
      return;
    }
    await loadWatchlist();
    S.showAddModal=false;S.searchResults=[];S.searchQ='';
    toast(`${m.title} added! 🎬`);render();
  }catch(e){
    console.error('addToWatchlist error',e);
    toast('Something went wrong — try again');
  }
}
async function toggleWatched(movieId,watched){
  await sb.from('watchlist').update({watched:!watched}).eq('user_id',S.user.id).eq('movie_id',movieId);
  await loadWatchlist();render();
}
async function removeFromWatchlist(movieId){
  await sb.from('watchlist').delete().eq('user_id',S.user.id).eq('movie_id',movieId);
  await loadWatchlist();render();
}
async function addToTogether(item){
  if(!S.playlist){toast('Set up a Together playlist first');return;}
  const movieId=item.movie_id||item.id;
  if(S.togetherMovies.find(m=>m.movie_id===movieId)){toast('Already in Together');return;}
  await sb.from('together_movies').insert({playlist_id:S.playlist.id,movie_id:movieId,added_by:S.user.id});
  await loadTogetherMovies();toast('Added to Together!');render();
}
async function removeFromTogether(movieId){
  await sb.from('together_movies').delete().eq('playlist_id',S.playlist.id).eq('movie_id',movieId);
  await sb.from('swipes').delete().eq('playlist_id',S.playlist.id).eq('movie_id',movieId);
  await loadTogetherMovies();await loadSwipes();render();
}

// PARTNER
async function searchPartner(username){
  if(!username.trim())return;
  const{data}=await sb.from('profiles').select('*').eq('username',username).neq('id',S.user.id).maybeSingle();
  if(!data){S.partnerSearchMsg='User not found';S.partnerSearchResult=null;}
  else{S.partnerSearchResult=data;S.partnerSearchMsg='';}
  render();
}
async function createPlaylistWith(partnerId){
  if(S.playlist){toast('You already have a Together playlist');return;}
  const{data,error}=await sb.from('together_playlists').insert({owner_id:S.user.id,partner_id:partnerId,name:'Our List'}).select().single();
  if(error){toast('Error creating playlist');return;}
  S.playlist=data;S.showPartnerModal=false;S.partnerSearchResult=null;S.partnerUsername='';
  await loadTogetherPlaylist();
  toast('Together playlist created! 🎉');render();
}

// SWIPE
function startSwipe(){
  const pool=S.togetherMovies.filter(m=>S.mySwipes[m.movie_id]===undefined);
  S.swipeQueue=[...pool].sort(()=>Math.random()-.5);
  S.swipeIndex=0;render();
}
async function doSwipe(movieId,liked){
  await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:S.user.id,movie_id:movieId,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.mySwipes[movieId]=liked;S.swipeIndex++;
  if(liked&&S.partnerSwipes[movieId]===true){
    const m=S.togetherMovies.find(t=>t.movie_id===movieId);
    toast(`🎉 Match! You both want: ${m?.movie?.title||'this movie'}`);
  }
  render();
}
async function doPartnerSwipe(movieId,liked){
  const partnerId=S.playlist.owner_id===S.user.id?S.playlist.partner_id:S.playlist.owner_id;
  await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:partnerId,movie_id:movieId,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.partnerSwipes[movieId]=liked;
  if(liked&&S.mySwipes[movieId]===true){
    const m=S.togetherMovies.find(t=>t.movie_id===movieId);
    toast(`🎉 Match! You both want: ${m?.movie?.title||'this movie'}`);
  }
  render();
}
function getMatches(){
  return S.togetherMovies.filter(m=>S.mySwipes[m.movie_id]===true&&S.partnerSwipes[m.movie_id]===true);
}

function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=screenAuth();return;}
  const tabs=[
    {id:'my',icon:'ti-list',label:'My list'},
    {id:'together',icon:'ti-users',label:'Together'},
    {id:'swipe',icon:'ti-cards',label:'Swipe'},
    {id:'profile',icon:'ti-user',label:'Profile'}
  ];
  let content='';
  if(S.tab==='my')content=screenMy();
  else if(S.tab==='together')content=screenTogether();
  else if(S.tab==='swipe')content=screenSwipe();
  else content=screenProfile();
  const nav=`<nav class="nav">${tabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}"></i><span>${t.label}</span></button>`).join('')}</nav>`;
  let modals='';
  if(S.showAddModal)modals+=modalAdd();
  if(S.showPartnerModal)modals+=modalPartner();
  app.innerHTML=`<div class="screen">${content}</div>${nav}${modals}`;
  if(S.showAddModal)setTimeout(()=>{document.getElementById('sInput')?.focus();},60);
  if(S.showPartnerModal)setTimeout(()=>{document.getElementById('pInput')?.focus();},60);
}

  const user=document.getElementById('aUser')?.value?.trim();
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!user||!email||!pass){S.authError='Please fill all fields';render();return;}
  if(user.length<3){S.authError='Username must be at least 3 characters';render();return;}
  signUp(email,pass,user);
};

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){S.user=session.user;await loadProfile();}
  render();
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){S.user=session.user;await loadProfile();render();}
    else if(event==='SIGNED_OUT'){S.user=null;S.profile=null;render();}
  });
})();
</script>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}</script>
</body>
</html>

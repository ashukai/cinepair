<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CinePair">
<meta name="theme-color" content="#0a0a0c">
<title>CinePair</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#0a0a0c;--surface:#141418;--surface2:#1c1c22;--surface3:#242430;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#efefef;--text2:#888899;--text3:#44445a;
  --accent:#d4a843;--accent-soft:#e8c87a;
  --accent-dim:rgba(212,168,67,0.13);--accent-border:rgba(212,168,67,0.25);
  --green:#4db87a;--green-dim:rgba(77,184,122,0.13);
  --red:#c96060;--red-dim:rgba(201,96,96,0.13);
  --blue:#5a9fd4;--blue-dim:rgba(90,159,212,0.13);
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --nav-h:60px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column;position:relative}
.screen{position:absolute;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--sab));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none}
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sab));background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;padding-top:2px;padding-bottom:var(--sab);z-index:100;}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px 4px;transition:color .2s;}
.nav-btn i{font-size:21px;line-height:1}
.nav-btn span{font-size:10px;font-weight:500;letter-spacing:.3px}
.nav-btn.active{color:var(--accent-soft)}
.header{padding-top:max(1.5rem,calc(var(--sat) + 0.75rem));padding-right:1rem;padding-bottom:.75rem;padding-left:1rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-.3px;color:var(--text)}
.logo em{color:var(--accent-soft);font-style:normal}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem .5rem;}
.section-title{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.6px;text-transform:uppercase}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 1rem .75rem;overflow:hidden;}
.card-pad{padding:1.25rem}
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.btn:active{opacity:.75;transform:scale(.97)}
.btn-gold{background:var(--accent);color:#0a0a0c;border-color:transparent;font-weight:600}
.btn-gold:active{background:var(--accent-soft)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:var(--radius-xs);border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.btn-sm:active{opacity:.7}
.btn-sm.on{background:var(--blue-dim);color:var(--blue);border-color:rgba(90,159,212,.25)}
.btn-sm.done{background:var(--green-dim);color:var(--green);border-color:rgba(77,184,122,.25)}
.btn-del{padding:6px 10px;font-size:13px;border-radius:var(--radius-xs);border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;}
.btn-del:active{color:var(--red)}
.btn-icon{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s;flex-shrink:0;}
.btn-icon:active{background:var(--surface2)}
input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;width:100%;transition:border-color .2s;}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap;letter-spacing:.2px}
.tag-gold{background:var(--accent-dim);color:var(--accent-soft)}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-gray{background:var(--surface3);color:var(--text3)}
.tag-blue{background:var(--blue-dim);color:var(--blue)}
.movie-item{display:flex;gap:12px;align-items:flex-start;padding:12px 1rem;border-bottom:0.5px solid var(--border);}
.movie-item:last-child{border-bottom:none}
.m-poster{width:46px;height:68px;border-radius:8px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;}
.m-poster img{width:100%;height:100%;object-fit:cover}
.m-info{flex:1;min-width:0;padding-top:1px}
.m-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.m-year{font-weight:400;color:var(--text2);font-size:13px}
.m-sub{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-plot{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.m-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding-top:1px}
.empty{text-align:center;padding:3rem 1rem 2rem;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.35}
.empty p{font-size:14px;line-height:1.5}
.filter-tabs{display:flex;gap:6px;padding:.25rem 1rem .75rem;overflow-x:auto}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{padding:6px 14px;font-size:13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;}
.ftab.active{background:var(--text);color:var(--bg);border-color:transparent;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;padding-bottom:max(1.5rem,var(--sab));}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem .75rem;flex-shrink:0;}
.modal-title{font-size:17px;font-weight:500}
.modal-close{width:34px;height:34px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.modal-body{overflow-y:auto;flex:1;padding:0 1rem}
.modal-body::-webkit-scrollbar{display:none}
.search-wrap{display:flex;gap:8px;margin-bottom:1rem;flex-shrink:0;padding:0 1rem}
.search-wrap input{flex:1;min-width:0}
.search-wrap .btn-gold{flex-shrink:0;padding:10px 18px}
.result-item{display:flex;gap:11px;align-items:center;padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;margin-bottom:2px;}
.result-item:active{background:var(--surface2)}
.r-poster{width:38px;height:56px;border-radius:7px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;}
.r-poster img{width:100%;height:100%;object-fit:cover}
.r-info{flex:1;min-width:0}
.r-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-add{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent-soft);font-size:17px;}
.swipe-card-inner{background:var(--surface2);border-radius:var(--radius-sm);padding:1.5rem 1rem;text-align:center;}
.swipe-poster{width:130px;height:195px;border-radius:var(--radius);background:var(--surface3);margin:0 auto 1.25rem;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:56px;}
.swipe-poster img{width:100%;height:100%;object-fit:cover}
.swipe-title{font-size:18px;font-weight:500;margin-bottom:4px;line-height:1.3}
.swipe-meta{font-size:13px;color:var(--text2);margin-bottom:.5rem}
.swipe-plot{font-size:13px;color:var(--text2);line-height:1.6;max-width:300px;margin:0 auto .875rem}
.prog-wrap{max-width:180px;margin:0 auto .75rem}
.prog-lbl{font-size:12px;color:var(--text3);margin-bottom:5px}
.prog-bar{height:2px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.swipe-btns{display:flex;justify-content:center;gap:3rem;margin-top:1rem}
.swipe-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform .1s;}
.swipe-btn:active{transform:scale(.88)}
.s-nope{background:var(--red-dim);color:var(--red);border:0.5px solid rgba(201,96,96,.2)}
.s-yep{background:var(--green-dim);color:var(--green);border:0.5px solid rgba(77,184,122,.2)}
.p-toggle{display:flex;gap:6px;margin-bottom:1rem}
.p-toggle button{flex:1;padding:9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.p-toggle button.active{background:var(--accent-dim);color:var(--accent-soft);border-color:var(--accent-border)}
.auth-screen{position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(2.5rem,calc(var(--sat) + 1rem)) 1.25rem 2rem;-webkit-overflow-scrolling:touch;}
.auth-screen::-webkit-scrollbar{display:none}
.auth-logo{font-family:'DM Serif Display',serif;font-size:48px;letter-spacing:-.5px;margin-bottom:.3rem}
.auth-logo em{color:var(--accent-soft);font-style:normal}
.auth-tag{color:var(--text3);font-size:15px;margin-bottom:2.5rem;font-weight:300;letter-spacing:.3px}
.auth-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:400px;}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.atab{flex:1;padding:11px;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.atab.active{color:var(--accent-soft);border-bottom-color:var(--accent-soft)}
.afield{margin-bottom:1.1rem}
.afield label{font-size:14px;color:var(--text2);display:block;margin-bottom:7px;font-weight:500}
.afield input{font-size:16px}
.err{background:var(--red-dim);color:var(--red);border-radius:var(--radius-xs);padding:11px 13px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.suc{background:var(--green-dim);color:var(--green);border-radius:var(--radius-xs);padding:11px 13px;font-size:13px;margin-bottom:1rem}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1rem}
.stat-box{background:var(--surface2);padding:.875rem .5rem;border-radius:var(--radius-sm);text-align:center}
.stat-n{font-size:24px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.3px}
.avatar{border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent-soft);flex-shrink:0;}
.match-card{border:0.5px solid var(--accent-border);background:rgba(212,168,67,0.04)}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:12px 0}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--sab) + 12px);left:50%;transform:translateX(-50%);background:var(--surface3);border:0.5px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);z-index:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .22s;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://mshcjeibgyhruxddjwxy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zaGNqZWliZ3locnV4ZGRqd3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2Mzc2NDksImV4cCI6MjA5NTIxMzY0OX0.IOijSeR9eCwaQ687VM8OyuGPvKJSN-Z77QxJuFAlAGs';
const TMDB_KEY='413ef3a9eddbeab6950c7464a3654671';
const TMDB_IMG='https://image.tmdb.org/t/p/w185';
const TMDB_BASE='https://api.themoviedb.org/3';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// guard against double-tap / multiple simultaneous adds
let _adding=false;

let S={
  user:null,profile:null,tab:'my',
  watchlist:[],togetherMovies:[],playlist:null,
  swipeQueue:[],swipeIdx:0,partnerView:false,
  mySwipes:{},partnerSwipes:{},
  filter:'all',modal:null,
  searchQ:'',isSearching:false,
  authTab:'login',authLoading:false,authErr:'',authOk:'',
  partnerQ:'',partnerResult:null,partnerMsg:'',
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3200);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// AUTH
async function signUp(email,pass,username){
  S.authLoading=true;S.authErr='';render();
  const{data:ex}=await sb.from('profiles').select('id').eq('username',username).maybeSingle();
  if(ex){S.authErr='Username already taken';S.authLoading=false;render();return;}
  const{data,error}=await sb.auth.signUp({email,password:pass});
  if(error){S.authErr=error.message;S.authLoading=false;render();return;}
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,username},{onConflict:'id'});
    const{data:sd,error:se}=await sb.auth.signInWithPassword({email,password:pass});
    if(!se&&sd.user){
      S.user=sd.user;S.profile={id:sd.user.id,username};
      await loadWatchlist();await loadTogetherPlaylist();
      S.authLoading=false;render();toast('Welcome to CinePair!');return;
    }
  }
  S.authOk='Account created! Please sign in.';S.authTab='login';S.authLoading=false;render();
}
async function signIn(email,pass){
  S.authLoading=true;S.authErr='';render();
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){S.authErr=error.message;S.authLoading=false;render();return;}
  S.user=data.user;await loadProfile();S.authLoading=false;render();toast('Welcome back!');
}
async function signOut(){
  await sb.auth.signOut();
  Object.assign(S,{user:null,profile:null,watchlist:[],togetherMovies:[],playlist:null,
    mySwipes:{},partnerSwipes:{},swipeQueue:[],swipeIdx:0,modal:null});
  render();
}

// DATA LOADING
async function loadProfile(){
  if(!S.user)return;
  const{data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile=data;
  await Promise.all([loadWatchlist(),loadTogetherPlaylist()]);
}
async function loadWatchlist(){
  const{data}=await sb.from('watchlist').select('*,movie:movies(*)').eq('user_id',S.user.id).order('added_at',{ascending:false});
  S.watchlist=data||[];
}
async function loadTogetherPlaylist(){
  const{data}=await sb.from('together_playlists')
    .select('*,owner:profiles!together_playlists_owner_id_fkey(username),partner:profiles!together_playlists_partner_id_fkey(username)')
    .or(`owner_id.eq.${S.user.id},partner_id.eq.${S.user.id}`)
    .order('created_at',{ascending:false}).limit(1).maybeSingle();
  S.playlist=data;
  if(data){await loadTogetherMovies();await loadSwipes();}
}
async function loadTogetherMovies(){
  if(!S.playlist)return;
  const{data}=await sb.from('together_movies').select('*,movie:movies(*)').eq('playlist_id',S.playlist.id).order('added_at',{ascending:false});
  S.togetherMovies=data||[];
}
async function loadSwipes(){
  if(!S.playlist)return;
  const{data}=await sb.from('swipes').select('*').eq('playlist_id',S.playlist.id);
  S.mySwipes={};S.partnerSwipes={};
  (data||[]).forEach(sw=>{
    if(sw.user_id===S.user.id)S.mySwipes[sw.movie_id]=sw.liked;
    else S.partnerSwipes[sw.movie_id]=sw.liked;
  });
}

// SEARCH — updates DOM directly, never re-renders modal
async function doSearch(){
  const el=document.getElementById('sInput');
  const q=(el?el.value:'').trim();
  if(!q){toast('Type a movie name first');return;}
  const resultsEl=document.getElementById('searchResults');
  if(resultsEl)resultsEl.innerHTML='<div class="loading-row"><div class="spinner"></div> Searching...</div>';
  try{
    const r=await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US&page=1`);
    const d=await r.json();
    const results=(d.results||[]).slice(0,7).map(m=>({
      id:String(m.id),title:m.title,
      year:m.release_date?m.release_date.slice(0,4):'?',
      poster_path:m.poster_path||null,
      imdb_rating:m.vote_average?parseFloat(m.vote_average.toFixed(1)):null,
      plot:m.overview||'',genre:null,director:null,runtime:null
    }));
    const el2=document.getElementById('searchResults');
    if(!el2)return;
    if(results.length===0){
      el2.innerHTML='<p style="font-size:13px;color:var(--text3);padding:10px 0">No results found — try another title</p>';
    }else{
      el2.innerHTML=results.map(m=>{
        const safeM=encodeURIComponent(JSON.stringify(m));
        return`<div class="result-item" onclick="addToWatchlistEncoded('${safeM}')">
          <div class="r-poster">${m.poster_path?`<img src="${TMDB_IMG}${esc(m.poster_path)}" loading="lazy">`:'🎬'}</div>
          <div class="r-info">
            <div class="r-title">${esc(m.title)} <span style="font-weight:400;color:var(--text2)">(${esc(m.year)})</span></div>
            <div class="r-meta">${m.imdb_rating?'★ '+m.imdb_rating+'  ':''}${esc((m.plot||'').slice(0,60))}${(m.plot||'').length>60?'...':''}</div>
          </div>
          <div class="r-add"><i class="ti ti-plus"></i></div>
        </div>`;
      }).join('');
    }
  }catch(e){
    const el2=document.getElementById('searchResults');
    if(el2)el2.innerHTML=`<p style="font-size:13px;color:var(--red);padding:10px 0">Search failed: ${e.message}</p>`;
  }
}

// safe wrapper — avoids JSON quoting issues in onclick
window.addToWatchlistEncoded=function(encoded){
  try{addToWatchlist(JSON.parse(decodeURIComponent(encoded)));}catch(e){toast('Error parsing movie');}
};

async function fetchMovieDetails(id){
  try{
    const r=await fetch(`${TMDB_BASE}/movie/${id}?api_key=${TMDB_KEY}&append_to_response=credits`);
    const d=await r.json();
    const dir=(d.credits?.crew||[]).find(c=>c.job==='Director');
    return{
      id:String(d.id),title:d.title,
      year:d.release_date?d.release_date.slice(0,4):'?',
      director:dir?dir.name:null,
      genre:d.genres?.[0]?.name||null,
      runtime:d.runtime?`${d.runtime}m`:null,
      imdb_rating:d.vote_average?parseFloat(d.vote_average.toFixed(1)):null,
      plot:d.overview||'',poster_path:d.poster_path||null
    };
  }catch(e){return null;}
}

async function addToWatchlist(movie){
  if(_adding){toast('Please wait...');return;}
  if(S.watchlist.find(w=>w.movie_id===movie.id)){toast('Already in your list');return;}
  _adding=true;
  toast('Adding...');
  try{
    const full=await fetchMovieDetails(movie.id);
    const m=full||movie;
    // upsert movie record
    const{error:me}=await sb.from('movies').upsert({
      id:m.id,title:m.title,year:m.year,director:m.director,
      genre:m.genre,runtime:m.runtime,imdb_rating:m.imdb_rating,
      plot:m.plot,poster_path:m.poster_path
    },{onConflict:'id'});
    if(me){toast('Movie error: '+me.message);return;}
    // check not already in watchlist (race condition guard)
    const{data:existing}=await sb.from('watchlist').select('id').eq('user_id',S.user.id).eq('movie_id',m.id).maybeSingle();
    if(existing){toast('Already in your list');return;}
    // insert watchlist row
    const{error:we}=await sb.from('watchlist').insert({user_id:S.user.id,movie_id:m.id});
    if(we){toast('Watchlist error: '+we.message);return;}
    await loadWatchlist();
    S.modal=null;
    render();
    toast(m.title+' added!');
  }catch(e){
    toast('Error: '+e.message);
  }finally{
    _adding=false;
  }
}

async function toggleWatched(movieId,watched){
  await sb.from('watchlist').update({watched:!watched}).eq('user_id',S.user.id).eq('movie_id',movieId);

async function removeFromWatchlist(movieId){

async function addToTogether(movieId){

  if(S.togetherMovies.find(m=>m.movie_id===movieId)){toast('Already in Together');return;}

  if(error){toast('Error: '+error.message);return;}

async function removeFromTogether(movieId){

// SWIPE
function startSwipe(){
  const pool=S.togetherMovies.filter(m=>S.mySwipes[m.movie_id]===undefined);
  S.swipeQueue=[...pool].sort(()=>Math.random()-.5);S.swipeIdx=0;render();
}
async function doSwipe(movieId,liked){
  await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:S.user.id,movie_id:movieId,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.mySwipes[movieId]=liked;S.swipeIdx++;
  if(liked&&S.partnerSwipes[movieId]===true){
    const m=S.togetherMovies.find(t=>t.movie_id===movieId);
    toast('Match: '+(m?.movie?.title||'Movie')+'!');
  }
  render();
}
async function doPartnerSwipe(movieId,liked){
  const partnerId=S.playlist.owner_id===S.user.id?S.playlist.partner_id:S.playlist.owner_id;
  await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:partnerId,movie_id:movieId,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.partnerSwipes[movieId]=liked;
  if(liked&&S.mySwipes[movieId]===true){
    const m=S.togetherMovies.find(t=>t.movie_id===movieId);
    toast('Match: '+(m?.movie?.title||'Movie')+'!');
  }
  render();
}
function getMatches(){return S.togetherMovies.filter(m=>S.mySwipes[m.movie_id]===true&&S.partnerSwipes[m.movie_id]===true);}

          </div>
        `:''}
      </div>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=renderAuth();return;}
  const tabs=[
    {id:'my',icon:'ti-list',label:'My list'},
    {id:'together',icon:'ti-users',label:'Together'},
    {id:'swipe',icon:'ti-cards',label:'Swipe'},
    {id:'profile',icon:'ti-user',label:'Profile'}
  ];
  let content='';
  if(S.tab==='my')content=renderMy();
  else if(S.tab==='together')content=renderTogether();
  else if(S.tab==='swipe')content=renderSwipe();
  else content=renderProfile();
  const nav=`<nav class="nav">${tabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}"></i><span>${t.label}</span></button>`).join('')}</nav>`;
  let modal='';
  if(S.modal==='add')modal=renderAddModal();
  else if(S.modal==='partner')modal=renderPartnerModal();
  app.innerHTML=`<div class="screen">${content}</div>${nav}${modal}`;
  if(S.modal==='add')setTimeout(()=>{document.getElementById('sInput')?.focus();},80);
  if(S.modal==='partner')setTimeout(()=>{document.getElementById('pInput')?.focus();},80);
}

window.setTab=t=>{S.tab=t;render();};
window.setFilter=f=>{S.filter=f;render();};
window.setAuthTab=t=>{S.authTab=t;S.authErr='';S.authOk='';render();};
window.setPartnerView=v=>{S.partnerView=v;render();};
window.openModal=m=>{S.modal=m;render();};
window.closeModal=()=>{S.modal=null;render();};
window.doSearch=doSearch;
window.doPartnerSearch=doPartnerSearch;
window.doSignOut=signOut;
window.startSwipe=startSwipe;
window.doSwipe=doSwipe;
window.doPartnerSwipe=doPartnerSwipe;
window.addToWatchlist=addToWatchlist;
window.toggleWatched=toggleWatched;
window.removeFromWatchlist=removeFromWatchlist;
window.addToTogether=addToTogether;
window.removeFromTogether=removeFromTogether;
window.createPlaylistWith=createPlaylistWith;
window.doSignIn=()=>{
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!email||!pass){S.authErr='Please fill all fields';render();return;}
  signIn(email,pass);
};
window.doSignUp=()=>{
  const user=document.getElementById('aUser')?.value?.trim();
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!user||!email||!pass){S.authErr='Please fill all fields';render();return;}
  if(user.length<3){S.authErr='Username must be at least 3 characters';render();return;}
  signUp(email,pass,user);
};

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){S.user=session.user;await loadProfile();}
  render();
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){S.user=session.user;await loadProfile();render();}
    else if(event==='SIGNED_OUT'){S.user=null;S.profile=null;render();}
  });
})();
</script>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}</script>
</body>
</html>

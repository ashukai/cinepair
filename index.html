<!DOCTYPE html>
<!-- CinePair v9 - built May 2026 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CinePair">
<meta name="theme-color" content="#0a0a0c">
<title>CinePair</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --bg:#080809;--surface:#111114;--surface2:#18181d;--surface3:#202028;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f2f2f2;--text2:#8a8a9a;--text3:#404055;
  --accent:#c9962a;--accent-soft:#e8c87a;--accent-dim:rgba(232,200,122,0.12);--accent-border:rgba(232,200,122,0.22);
  --green:#3daa6e;--green-dim:rgba(61,170,110,0.13);--green-border:rgba(61,170,110,0.25);
  --red:#b85555;--red-dim:rgba(184,85,85,0.13);
  --blue:#4a8fc4;--blue-dim:rgba(74,143,196,0.13);--blue-border:rgba(74,143,196,0.25);
  --radius:18px;--radius-sm:11px;--radius-xs:7px;
  --nav-h:62px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
#app{height:100%;position:relative}
.screen{position:absolute;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--sab));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen::-webkit-scrollbar{display:none}

/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sab));background:var(--surface);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;padding-bottom:var(--sab);z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.nav-btn{flex:1;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 6px;transition:color .2s;position:relative;}
.nav-btn i{font-size:22px;line-height:1}
.nav-btn span{font-size:10px;font-weight:500;letter-spacing:.3px}
.nav-btn.active{color:var(--accent-soft)}
.nav-btn.active::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--accent-soft);border-radius:0 0 2px 2px;}
.nav-add{position:absolute;right:16px;bottom:calc(var(--nav-h) + var(--sab) + 16px);width:52px;height:52px;border-radius:50%;background:var(--accent-soft);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0a0a0c;font-size:26px;box-shadow:0 4px 20px rgba(232,200,122,0.35);z-index:101;transition:transform .15s,box-shadow .15s;}
.nav-add:active{transform:scale(.93);box-shadow:0 2px 10px rgba(232,200,122,0.2)}

/* HEADER */
.header{padding-top:max(1.5rem,calc(var(--sat) + 0.6rem));padding-right:1rem;padding-bottom:.5rem;padding-left:1rem;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px;color:var(--text)}
.logo em{color:var(--accent-soft);font-style:normal}

/* SECTION */
.section-head{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem .4rem;}
.section-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}

/* CARD */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin:0 1rem .75rem;overflow:hidden;}
.card-pad{padding:1.25rem}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-gold{background:var(--accent-soft);color:#0a0a0c;border-color:transparent;font-weight:600}
.btn-icon{width:38px;height:38px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .15s;}
.btn-icon:active{background:var(--surface3)}

/* PILL BUTTONS for movie actions */
.pill{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s;}
.pill:active{opacity:.7}
.pill.seen{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.pill.together{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-border)}
.pill.remove{background:transparent;color:var(--text3);border-color:transparent}
.pill.remove:active{color:var(--red)}

/* INPUT */
input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;width:100%;transition:border-color .2s;}
input:focus{border-color:var(--accent-soft)}
input::placeholder{color:var(--text3)}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-gold{background:var(--accent-dim);color:var(--accent-soft)}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-gray{background:var(--surface3);color:var(--text3)}
.tag-blue{background:var(--blue-dim);color:var(--blue)}

/* MOVIE ITEM — clean card style */
.movie-item{display:flex;gap:13px;align-items:flex-start;padding:14px 1rem;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .12s;}
.movie-item:last-child{border-bottom:none}
.movie-item:active{background:var(--surface2)}
.m-poster{width:56px;height:82px;border-radius:9px;background:var(--surface3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.m-poster img{width:100%;height:100%;object-fit:cover}
.m-info{flex:1;min-width:0}
.m-title{font-size:16px;font-weight:500;line-height:1.3;color:var(--text)}
.m-year{font-weight:400;color:var(--text2);font-size:13px}
.m-sub{font-size:13px;color:var(--text2);margin-top:3px}
.m-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.m-chevron{color:var(--text3);font-size:18px;flex-shrink:0;padding-top:2px;align-self:center}

/* MOVIE DETAIL SHEET */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;}
.detail-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;padding-bottom:max(1.5rem,var(--sab));}
.detail-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.detail-body{overflow-y:auto;flex:1;padding:1rem 1.25rem 0;}
.detail-body::-webkit-scrollbar{display:none}
.detail-poster-row{display:flex;gap:1rem;margin-bottom:1.25rem}
.detail-poster{width:90px;height:135px;border-radius:12px;background:var(--surface3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-title{font-size:20px;font-weight:600;line-height:1.3;margin-bottom:4px}
.detail-meta{font-size:13px;color:var(--text2);line-height:1.6}
.detail-plot{font-size:14px;color:var(--text2);line-height:1.7;margin:1rem 0}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;padding:1rem 1.25rem 0;flex-shrink:0}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;padding:.25rem 1rem .6rem;overflow-x:auto}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{padding:6px 14px;font-size:13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;}
.ftab.active{background:var(--text);color:var(--bg);border-color:transparent;font-weight:500}

/* MODAL (search / partner) */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;padding-bottom:max(1.5rem,var(--sab));}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem .75rem;flex-shrink:0;}
.modal-title{font-size:17px;font-weight:500}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.modal-body{overflow-y:auto;flex:1;padding:0 1rem}
.modal-body::-webkit-scrollbar{display:none}
.search-wrap{display:flex;gap:8px;padding:0 1rem .75rem;flex-shrink:0}
.search-wrap input{flex:1;min-width:0}

/* SEARCH RESULT */
.result-item{display:flex;gap:11px;align-items:center;padding:10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;margin-bottom:2px;}
.result-item:active{background:var(--surface2)}
.r-poster{width:40px;height:60px;border-radius:7px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.r-poster img{width:100%;height:100%;object-fit:cover}
.r-info{flex:1;min-width:0}
.r-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-meta{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-add{width:30px;height:30px;border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent-soft);font-size:16px;}

/* SWIPE */
.swipe-inner{background:var(--surface2);border-radius:var(--radius-sm);padding:1.5rem 1rem;text-align:center;}
.swipe-poster{width:140px;height:210px;border-radius:var(--radius);background:var(--surface3);margin:0 auto 1.25rem;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:60px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.swipe-poster img{width:100%;height:100%;object-fit:cover}
.prog-wrap{max-width:160px;margin:0 auto .75rem}
.prog-lbl{font-size:12px;color:var(--text3);margin-bottom:5px}
.prog-bar{height:2px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent-soft);border-radius:2px;transition:width .3s}
.swipe-btns{display:flex;justify-content:center;gap:3rem;margin-top:1.25rem}
.swipe-btn{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform .1s;box-shadow:0 4px 14px rgba(0,0,0,.3);}
.swipe-btn:active{transform:scale(.88)}
.s-nope{background:#2a1515;color:var(--red);border:0.5px solid rgba(184,85,85,.3)}
.s-yep{background:#0f2a1a;color:var(--green);border:0.5px solid rgba(61,170,110,.3)}
.p-toggle{display:flex;gap:6px;margin-bottom:1rem}
.p-toggle button{flex:1;padding:9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.p-toggle button.active{background:var(--accent-dim);color:var(--accent-soft);border-color:var(--accent-border)}

/* AUTH */
.auth-screen{position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(2.5rem,calc(var(--sat)+1rem)) 1.25rem 2rem;-webkit-overflow-scrolling:touch;}
.auth-screen::-webkit-scrollbar{display:none}
.auth-logo{font-family:'DM Serif Display',serif;font-size:52px;letter-spacing:-.5px;margin-bottom:.25rem}
.auth-logo em{color:var(--accent-soft);font-style:normal}
.auth-tag{color:var(--text3);font-size:14px;margin-bottom:2.5rem;letter-spacing:.3px}
.auth-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:400px;}
.auth-tabs{display:flex;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.atab{flex:1;padding:11px;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.atab.active{color:var(--accent-soft);border-bottom-color:var(--accent-soft)}
.afield{margin-bottom:1.1rem}
.afield label{font-size:14px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
.err{background:var(--red-dim);color:var(--red);border-radius:var(--radius-xs);padding:11px 13px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.suc{background:var(--green-dim);color:var(--green);border-radius:var(--radius-xs);padding:11px 13px;font-size:13px;margin-bottom:1rem}

/* STATS */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1rem}
.stat-box{background:var(--surface2);padding:.875rem .5rem;border-radius:var(--radius-sm);text-align:center}
.stat-n{font-size:26px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.3px}

/* MISC */
.avatar{border-radius:50%;background:var(--accent-dim);border:0.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--accent-soft);flex-shrink:0;}
.match-card{border:0.5px solid var(--accent-border);background:rgba(232,200,122,0.04)}
.empty{text-align:center;padding:3rem 1rem 2rem;color:var(--text3)}
.empty i{font-size:38px;display:block;margin-bottom:10px;opacity:.3}
.empty p{font-size:14px;line-height:1.6}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent-soft);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:12px 0}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--sab) + 14px);left:50%;transform:translateX(-50%);background:#1e1e26;border:0.5px solid var(--border2);border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);z-index:500;pointer-events:none;opacity:0;transition:opacity .22s;max-width:88vw;text-align:center;}
.toast.show{opacity:1}
.divider{height:0.5px;background:var(--border);margin:0}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://mshcjeibgyhruxddjwxy.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zaGNqZWliZ3locnV4ZGRqd3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2Mzc2NDksImV4cCI6MjA5NTIxMzY0OX0.IOijSeR9eCwaQ687VM8OyuGPvKJSN-Z77QxJuFAlAGs';
const TMDB_KEY='413ef3a9eddbeab6950c7464a3654671';
const TMDB_IMG='https://image.tmdb.org/t/p/w342';
const TMDB_BASE='https://api.themoviedb.org/3';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let _adding=false;
let _searchTimer=null;

let S={
  user:null,profile:null,tab:'my',
  watchlist:[],togetherMovies:[],playlist:null,
  swipeQueue:[],swipeIdx:0,partnerView:false,
  mySwipes:{},partnerSwipes:{},
  filter:'all',modal:null,detail:null,
  authTab:'login',authLoading:false,authErr:'',authOk:'',
  partnerQ:'',partnerResult:null,partnerMsg:'',
  partnerName:'Partner',
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// AUTH
async function signUp(email,pass,username){
  S.authLoading=true;S.authErr='';render();
  const{data:ex}=await sb.from('profiles').select('id').eq('username',username).maybeSingle();
  if(ex){S.authErr='Username already taken';S.authLoading=false;render();return;}
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username}}});
  if(error){S.authErr=error.message;S.authLoading=false;render();return;}
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,username},{onConflict:'id'});
    const{data:sd,error:se}=await sb.auth.signInWithPassword({email,password:pass});
    if(!se&&sd.user){
      S.user=sd.user;S.profile={id:sd.user.id,username};
      await loadWatchlist();await loadTogetherPlaylist();
      S.authLoading=false;render();toast('Welcome to CinePair!');return;
    }
  }
  S.authOk='Account created! Please sign in.';S.authTab='login';S.authLoading=false;render();
}
async function signIn(email,pass){
  S.authLoading=true;S.authErr='';render();
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){S.authErr=error.message;S.authLoading=false;render();return;}
  S.user=data.user;await loadProfile();S.authLoading=false;render();toast('Welcome back!');
}
async function signOut(){
  await sb.auth.signOut();
  Object.assign(S,{user:null,profile:null,watchlist:[],togetherMovies:[],playlist:null,
    mySwipes:{},partnerSwipes:{},swipeQueue:[],swipeIdx:0,modal:null,detail:null});
  render();
}

// DATA
async function loadProfile(){
  if(!S.user)return;
  const{data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile=data;
  await Promise.all([loadWatchlist(),loadTogetherPlaylist()]);
}
async function loadWatchlist(){
  const{data}=await sb.from('watchlist').select('*,movie:movies(*)').eq('user_id',S.user.id).order('added_at',{ascending:false});
  S.watchlist=data||[];
}
async function loadTogetherPlaylist(){
  const{data}=await sb.from('together_playlists')
    .select('*,owner:profiles!together_playlists_owner_id_fkey(username),partner:profiles!together_playlists_partner_id_fkey(username)')
    .or(`owner_id.eq.${S.user.id},partner_id.eq.${S.user.id}`)
    .order('created_at',{ascending:false}).limit(1).maybeSingle();
  S.playlist=data;
  if(data){
    const pName=data.owner_id===S.user.id?data.partner?.username:data.owner?.username;
    if(pName)S.partnerName=pName;
    await loadTogetherMovies();await loadSwipes();
  }
}
async function loadTogetherMovies(){
  if(!S.playlist)return;
  const{data}=await sb.from('together_movies').select('*,movie:movies(*)').eq('playlist_id',S.playlist.id).order('added_at',{ascending:false});
  S.togetherMovies=data||[];
}
async function loadSwipes(){
  if(!S.playlist)return;
  const{data}=await sb.from('swipes').select('*').eq('playlist_id',S.playlist.id);
  S.mySwipes={};S.partnerSwipes={};
  (data||[]).forEach(sw=>{
    if(sw.user_id===S.user.id)S.mySwipes[sw.movie_id]=sw.liked;
    else S.partnerSwipes[sw.movie_id]=sw.liked;
  });
}

// TMDB SEARCH — live as you type
async function doSearch(){
  const el=document.getElementById('sInput');
  const q=(el?el.value:'').trim();
  const resultsEl=document.getElementById('searchResults');
  if(!q){
    if(resultsEl)resultsEl.innerHTML='<p style="font-size:13px;color:var(--text3);padding:8px 0">Type a movie title to search</p>';
    return;
  }
  if(resultsEl)resultsEl.innerHTML='<div class="loading-row"><div class="spinner"></div> Searching...</div>';
  try{
    const r=await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&language=en-US&page=1`);
    const d=await r.json();
    const results=(d.results||[]).slice(0,8).map(m=>({
      id:String(m.id),title:m.title,
      year:m.release_date?m.release_date.slice(0,4):'?',
      poster_path:m.poster_path||null,
      imdb_rating:m.vote_average?parseFloat(m.vote_average.toFixed(1)):null,
      plot:m.overview||'',genre:null,director:null,runtime:null
    }));
    const el2=document.getElementById('searchResults');
    if(!el2)return;
    if(results.length===0){
      el2.innerHTML='<p style="font-size:13px;color:var(--text3);padding:10px 0">No results — try another title</p>';
    }else{
      el2.innerHTML=results.map(m=>{
        const enc=encodeURIComponent(JSON.stringify(m));
        return`<div class="result-item" onclick="addToWatchlistEnc('${enc}')">
          <div class="r-poster">${m.poster_path?`<img src="https://image.tmdb.org/t/p/w92${esc(m.poster_path)}" loading="lazy">`:'🎬'}</div>
          <div class="r-info">
            <div class="r-title">${esc(m.title)} <span style="font-weight:400;color:var(--text2)">(${esc(m.year)})</span></div>
            <div class="r-meta">${m.imdb_rating?'★ '+m.imdb_rating+'  ':''}${esc((m.plot||'').slice(0,60))}${(m.plot||'').length>60?'...':''}</div>
          </div>
          <div class="r-add"><i class="ti ti-plus"></i></div>
        </div>`;
      }).join('');
    }
  }catch(e){
    const el2=document.getElementById('searchResults');
    if(el2)el2.innerHTML=`<p style="font-size:13px;color:var(--red);padding:10px 0">Search failed — check your connection</p>`;
  }
}

function onSearchInput(){
  clearTimeout(_searchTimer);

window.addToWatchlistEnc=function(enc){
  try{addToWatchlist(JSON.parse(decodeURIComponent(enc)));}catch(e){toast('Error');}
};

async function fetchMovieDetails(id){
  try{
    const r=await fetch(`${TMDB_BASE}/movie/${id}?api_key=${TMDB_KEY}&append_to_response=credits`);
    const d=await r.json();
    const dir=(d.credits?.crew||[]).find(c=>c.job==='Director');
    return{
      id:String(d.id),title:d.title,
      year:d.release_date?d.release_date.slice(0,4):'?',
      director:dir?dir.name:null,
      genre:d.genres?.[0]?.name||null,
      runtime:d.runtime?`${d.runtime}m`:null,
      imdb_rating:d.vote_average?parseFloat(d.vote_average.toFixed(1)):null,
      plot:d.overview||'',poster_path:d.poster_path||null
    };
  }catch(e){return null;}
}

async function addToWatchlist(movie){
  if(_adding){toast('Please wait...');return;}
  if(S.watchlist.find(w=>w.movie_id===movie.id)){toast('Already in your list');return;}
  _adding=true;
  toast('Adding...');
  try{
    const full=await fetchMovieDetails(movie.id);
    const m=full||movie;
    const{error:me}=await sb.from('movies').upsert({
      id:m.id,title:m.title,year:m.year,director:m.director,
      genre:m.genre,runtime:m.runtime,imdb_rating:m.imdb_rating,
      plot:m.plot,poster_path:m.poster_path
    },{onConflict:'id'});
    if(me){toast('Movie error: '+me.message);return;}
    const{data:existing}=await sb.from('watchlist').select('id').eq('user_id',S.user.id).eq('movie_id',m.id).maybeSingle();
    if(existing){toast('Already in your list');return;}
    const{error:we}=await sb.from('watchlist').insert({user_id:S.user.id,movie_id:m.id});
    if(we){toast('Error: '+we.message);return;}
    await loadWatchlist();
    S.modal=null;render();toast(m.title+' added!');
  }catch(e){toast('Error: '+e.message);}
  finally{_adding=false;}
}

async function toggleWatched(movieId,watched,e){
  if(e)e.stopPropagation();
  await sb.from('watchlist').update({watched:!watched}).eq('user_id',S.user.id).eq('movie_id',movieId);
  await loadWatchlist();
  if(S.detail&&S.detail.movie_id===movieId)S.detail.watched=!watched;
  render();
}
async function removeFromWatchlist(movieId,e){
  if(e)e.stopPropagation();
  await sb.from('watchlist').delete().eq('user_id',S.user.id).eq('movie_id',movieId);
  await loadWatchlist();S.detail=null;render();
}
async function addToTogether(movieId,e){
  if(e)e.stopPropagation();
  if(!S.playlist){toast('Set up a Together playlist first');return;}
  if(S.togetherMovies.find(m=>m.movie_id===movieId)){toast('Already in Together');return;}
  const{error}=await sb.from('together_movies').insert({playlist_id:S.playlist.id,movie_id:movieId,added_by:S.user.id});
  if(error){toast('Error: '+error.message);return;}
  await loadTogetherMovies();toast('Added to Together!');render();
}
async function removeFromTogether(movieId,e){
  if(e)e.stopPropagation();
  await sb.from('together_movies').delete().eq('playlist_id',S.playlist.id).eq('movie_id',movieId);
  await sb.from('swipes').delete().eq('playlist_id',S.playlist.id).eq('movie_id',movieId);
  await loadTogetherMovies();await loadSwipes();render();
}

// PARTNER
async function doPartnerSearch(){
  const el=document.getElementById('pInput');
  const q=(el?el.value:'').trim();
  if(!q)return;
  const{data}=await sb.from('profiles').select('*').eq('username',q).neq('id',S.user.id).maybeSingle();
  if(!data){S.partnerMsg='User not found';S.partnerResult=null;}
  else{S.partnerResult=data;S.partnerMsg='';}
  render();
}
async function createPlaylistWith(partnerId){
  if(S.playlist){toast('Already connected with a partner');return;}
  const{data,error}=await sb.from('together_playlists').insert({owner_id:S.user.id,partner_id:partnerId,name:'Our List'}).select().single();
  if(error){toast('Error: '+error.message);return;}
  S.playlist=data;S.modal=null;S.partnerResult=null;S.partnerQ='';
  await loadTogetherPlaylist();toast('Connected!');render();
}
async function createSoloPlaylist(){
  if(S.playlist){
    toast('Together playlist already exists!');
    S.tab='together';render();return;
  }
  try{
    const{data,error}=await sb.from('together_playlists').insert({owner_id:S.user.id,name:'Our List'}).select().single();
    if(error){toast('Error: '+error.message);return;}
    S.playlist=data;S.modal=null;
    await loadTogetherPlaylist();
    toast('Together playlist created!');
    S.tab='together';render();
  }catch(e){toast('Error: '+e.message);}
}

// SWIPE
function startSwipe(){
  const pool=S.togetherMovies.filter(m=>S.mySwipes[m.movie_id]===undefined);
  S.swipeQueue=[...pool].sort(()=>Math.random()-.5);S.swipeIdx=0;render();
}
async function resetSwipes(){
  if(!S.playlist)return;
  await sb.from('swipes').delete().eq('playlist_id',S.playlist.id);
  S.mySwipes={};S.partnerSwipes={};S.swipeQueue=[];S.swipeIdx=0;
  toast('Swipes reset! Start fresh.');render();
}
async function doSwipe(movieId,liked){
  await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:S.user.id,movie_id:movieId,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.mySwipes[movieId]=liked;S.swipeIdx++;
  if(liked&&S.partnerSwipes[movieId]===true){
    const m=S.togetherMovies.find(t=>t.movie_id===movieId);
    toast('Match: '+(m?.movie?.title||'this movie')+'!');
  }
  render();
}
async function doPartnerSwipe(movieId,liked){
  const partnerId=S.playlist.partner_id&&S.playlist.owner_id===S.user.id?S.playlist.partner_id:S.playlist.owner_id;
  // for solo mode, use a fake partner id based on username
  const effectivePartnerId=S.playlist.partner_id?partnerId:S.user.id+'_partner';
  await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:effectivePartnerId,movie_id:movieId,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.partnerSwipes[movieId]=liked;
  if(liked&&S.mySwipes[movieId]===true){
    const m=S.togetherMovies.find(t=>t.movie_id===movieId);
    toast('Match: '+(m?.movie?.title||'this movie')+'!');
  }
  render();
}
function getMatches(){
  // only show matches when both have finished swiping all movies
  const myDoneAll=S.togetherMovies.every(m=>S.mySwipes[m.movie_id]!==undefined);
  const partnerDoneAll=S.togetherMovies.every(m=>S.partnerSwipes[m.movie_id]!==undefined);
  if(!myDoneAll||!partnerDoneAll)return[];
  return S.togetherMovies.filter(m=>S.mySwipes[m.movie_id]===true&&S.partnerSwipes[m.movie_id]===true);
}

      `:`
        ${partnerUnswiped.length===0?`
          <div class="empty" style="padding:1.5rem 0"><i class="ti ti-check" style="color:var(--green)"></i><p>${esc(pName)} is all done!</p></div>
          <div style="text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:1rem">
            <button class="btn" style="color:var(--red)" onclick="resetSwipes()"><i class="ti ti-rotate"></i> Reset all swipes</button>
          </div>
        `:`
          <p style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:1rem">${hasPartner?'Ask '+esc(pName)+' to open CinePair':'Pass the phone to '+esc(pName)} 📱</p>
          <div class="swipe-inner">
            <div class="swipe-poster">${pImg(partnerUnswiped[0].movie?.poster_path,140,210,'w342')}</div>
            <div style="font-size:18px;font-weight:500;margin-bottom:4px;line-height:1.3">${esc(partnerUnswiped[0].movie?.title||'')} <span style="font-size:13px;font-weight:400;color:var(--text2)">(${esc(partnerUnswiped[0].movie?.year||'')})</span></div>
            <div style="font-size:13px;color:var(--text2);margin-bottom:.5rem">${esc(partnerUnswiped[0].movie?.genre||'')}${partnerUnswiped[0].movie?.imdb_rating?' · ★ '+partnerUnswiped[0].movie.imdb_rating:''}</div>
            <div style="font-size:13px;color:var(--text2);line-height:1.65;max-width:300px;margin:0 auto .875rem">${esc(partnerUnswiped[0].movie?.plot||'')}</div>
            <p style="font-size:12px;color:var(--text3);margin-bottom:1rem">${partnerUnswiped.length} remaining</p>
            <div class="swipe-btns">
              <button class="swipe-btn s-nope" onclick="doPartnerSwipe('${partnerUnswiped[0].movie_id}',false)"><i class="ti ti-x"></i></button>
              <button class="swipe-btn s-yep" onclick="doPartnerSwipe('${partnerUnswiped[0].movie_id}',true)"><i class="ti ti-heart"></i></button>
            </div>
          </div>
        `}
      `}
    </div>
    ${matches.length>0?`
      <div class="section-head"><span class="section-title" style="color:var(--accent-soft)">Matches</span><span style="font-size:12px;color:var(--text3)">${matches.length}</span></div>
      <div class="card match-card">
        ${matches.map(m=>`
          <div class="movie-item" onclick="openDetail('${m.movie_id}')">
            <div class="m-poster" style="width:56px;height:82px">${pImg(m.movie?.poster_path,52,76,'w92')}</div>
            <div class="m-info">
              <div class="m-title">${esc(m.movie?.title||'')} <span class="m-year">(${esc(m.movie?.year||'')})</span></div>
              <div class="m-sub">${esc(m.movie?.director||'')}${m.movie?.imdb_rating?' · ★'+m.movie.imdb_rating:''}</div>
              <div class="tags"><span class="tag tag-green">You both want this!</span></div>
            </div>
            <i class="ti ti-chevron-right m-chevron"></i>
          </div>`).join('')}
      </div>
    `:''}`;
}

function renderProfile(){
  const pName=S.playlist?(S.playlist.owner_id===S.user.id?S.playlist.partner?.username:S.playlist.owner?.username):null;
  const hasPartner=!!(S.playlist&&S.playlist.partner_id);
  return`
    <div class="header"><div class="logo">Cine<em>Pair</em></div></div>
    <div class="card card-pad" style="margin-top:.5rem">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:1.25rem">
        <div class="avatar" style="width:50px;height:50px;font-size:19px">${(S.profile?.username||'?')[0].toUpperCase()}</div>
        <div>
          <div style="font-size:17px;font-weight:500">@${esc(S.profile?.username||'')}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:2px">${esc(S.user?.email||'')}</div>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-n">${S.watchlist.length}</div><div class="stat-l">Saved</div></div>
        <div class="stat-box"><div class="stat-n">${S.watchlist.filter(w=>w.watched).length}</div><div class="stat-l">Watched</div></div>
        <div class="stat-box"><div class="stat-n">${getMatches().length}</div><div class="stat-l">Matches</div></div>
      </div>
    </div>
    <div class="card card-pad">
      <div style="font-size:14px;font-weight:500;margin-bottom:.75rem;color:var(--text2);text-transform:uppercase;font-size:11px;letter-spacing:.6px">Partner</div>
      ${hasPartner?`
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar" style="width:38px;height:38px;font-size:14px">${(pName||'?')[0].toUpperCase()}</div>
          <div>
            <div style="font-weight:500">@${esc(pName||'')}</div>
            <div style="font-size:12px;color:var(--text3);margin-top:2px">Connected · ${S.togetherMovies.length} movies together</div>
          </div>
        </div>
      `:S.playlist?`
        <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Using single-phone mode. Add a partner account anytime.</p>
        <button class="btn" style="padding:8px 14px;font-size:13px" onclick="openModal('partner')"><i class="ti ti-user-plus"></i> Connect partner account</button>
      `:`
        <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">No partner connected yet.</p>
      `}
    </div>
    ${S.playlist&&!hasPartner?`
      <div class="card card-pad">
        <div style="font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--text3);text-transform:uppercase;margin-bottom:.75rem">Partner name (for swipe view)</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="pNameInput" value="${esc(S.partnerName)}" placeholder="e.g. Wife, Sarah..." style="flex:1">
          <button class="btn btn-gold" style="padding:8px 14px;font-size:13px;flex-shrink:0" onclick="savePartnerName()">Save</button>
        </div>
      </div>
    `:''}
    <div style="padding:0 1rem 1rem">
      <button class="btn" style="width:100%;justify-content:center" onclick="doSignOut()"><i class="ti ti-logout"></i> Sign out</button>
    </div>`;
}

function savePartnerName(){
  const el=document.getElementById('pNameInput');
  if(el&&el.value.trim()){S.partnerName=el.value.trim();toast('Saved!');render();}
}

function renderAddModal(){
  return`<div class="modal-overlay">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-drag"></div>
      <div class="modal-head">
        <div class="modal-title">Search movies</div>
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="search-wrap">
        <input type="text" id="sInput" placeholder="Start typing a movie name..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearchInput()" onkeydown="if(event.key==='Enter'){clearTimeout(_searchTimer);doSearch()}">
      </div>
      <div class="modal-body" id="searchResults">
        <p style="font-size:13px;color:var(--text3);padding:8px 0">Start typing to search movies</p>
      </div>
    </div>
  </div>`;
}

function renderPartnerModal(){
  return`<div class="modal-overlay">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-drag"></div>
      <div class="modal-head">
        <div class="modal-title">Connect partner account</div>
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <p style="font-size:14px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Your partner needs their own CinePair account. Search by their username to connect.</p>
        <div style="display:flex;gap:8px;margin-bottom:1rem">
          <input type="text" id="pInput" placeholder="their_username" value="${esc(S.partnerQ)}" oninput="S.partnerQ=this.value" autocomplete="off" onkeydown="if(event.key==='Enter')doPartnerSearch()" style="flex:1;min-width:0">
          <button class="btn btn-gold" style="flex-shrink:0" onclick="doPartnerSearch()">Find</button>
        </div>
        ${S.partnerMsg?`<div class="err">${esc(S.partnerMsg)}</div>`:''}
        ${S.partnerResult?`
          <div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface2);padding:13px;border-radius:var(--radius-sm)">
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar" style="width:36px;height:36px;font-size:14px">${S.partnerResult.username[0].toUpperCase()}</div>
              <div style="font-weight:500">@${esc(S.partnerResult.username)}</div>
            </div>
            <button class="btn btn-gold" style="padding:8px 16px;font-size:13px" onclick="createPlaylistWith('${S.partnerResult.id}')">Connect</button>
          </div>
        `:''}
      </div>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=renderAuth();return;}
  const tabs=[
    {id:'my',icon:'ti-list',label:'My list'},
    {id:'together',icon:'ti-users',label:'Together'},
    {id:'swipe',icon:'ti-cards',label:'Swipe'},
    {id:'profile',icon:'ti-user',label:'Profile'}
  ];
  let content='';
  if(S.tab==='my')content=renderMy();
  else if(S.tab==='together')content=renderTogether();
  else if(S.tab==='swipe')content=renderSwipe();
  else content=renderProfile();
  const nav=`<nav class="nav">
    ${tabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><i class="ti ${t.icon}"></i><span>${t.label}</span></button>`).join('')}
  </nav>
  ${S.tab==='my'?`<button class="nav-add" onclick="openModal('add')"><i class="ti ti-plus"></i></button>`:''}`;
  let modal='';
  if(S.modal==='add')modal=renderAddModal();
  else if(S.modal==='partner')modal=renderPartnerModal();
  let detail='';
  if(S.detail)detail=renderDetail();
  app.innerHTML=`<div class="screen">${content}</div>${nav}${modal}${detail}`;
  if(S.modal==='add')setTimeout(()=>{document.getElementById('sInput')?.focus();},80);
  if(S.modal==='partner')setTimeout(()=>{document.getElementById('pInput')?.focus();},80);
}

window.setTab=t=>{S.tab=t;render();};
window.setFilter=f=>{S.filter=f;render();};
window.setAuthTab=t=>{S.authTab=t;S.authErr='';S.authOk='';render();};
window.setPartnerView=v=>{S.partnerView=v;render();};
window.openModal=m=>{S.modal=m;render();};
window.closeModal=()=>{S.modal=null;render();};
window.openDetail=openDetail;
window.doSearch=doSearch;
window.onSearchInput=onSearchInput;
window.doPartnerSearch=doPartnerSearch;
window.doSignOut=signOut;
window.startSwipe=startSwipe;
window.resetSwipes=resetSwipes;
window.doSwipe=doSwipe;
window.doPartnerSwipe=doPartnerSwipe;
window.addToWatchlist=addToWatchlist;
window.toggleWatched=toggleWatched;
window.removeFromWatchlist=removeFromWatchlist;
window.addToTogether=addToTogether;
window.removeFromTogether=removeFromTogether;
window.createPlaylistWith=createPlaylistWith;
window.createSoloPlaylist=createSoloPlaylist;
window.savePartnerName=savePartnerName;
window.doSignIn=()=>{
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!email||!pass){S.authErr='Please fill all fields';render();return;}
  signIn(email,pass);
};
window.doSignUp=()=>{
  const user=document.getElementById('aUser')?.value?.trim();
  const email=document.getElementById('aEmail')?.value;
  const pass=document.getElementById('aPass')?.value;
  if(!user||!email||!pass){S.authErr='Please fill all fields';render();return;}
  if(user.length<3){S.authErr='Username must be at least 3 characters';render();return;}
  signUp(email,pass,user);
};

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){S.user=session.user;await loadProfile();}
  render();
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){S.user=session.user;await loadProfile();render();}
    else if(event==='SIGNED_OUT'){S.user=null;S.profile=null;render();}
  });
})();
</script>
<script>if('serviceWorker'in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const w=reg.installing;
      w.addEventListener('statechange',()=>{
        if(w.state==='installed'&&navigator.serviceWorker.controller){
          window.location.reload();
        }
      });
    });
  }).catch(()=>{});
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data==='reload')window.location.reload();
  });
}</script>
</body>
</html>

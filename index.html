<style>
:root{
  --bg:#f2f4f7;--surface:#fff;--surface2:#f4f5f8;--surface3:#eaecf0;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);
  --text:#0d0d14;--text2:#5a5a72;--text3:#9898b0;
  --gold:#c9962a;--gold-dim:rgba(201,150,42,0.1);--gold-border:rgba(201,150,42,0.25);
  --green:#1a7a4a;--green-dim:rgba(26,122,74,0.1);--green-border:rgba(26,122,74,0.22);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.1);--red-border:rgba(192,57,43,0.22);
  --blue:#1a6fb5;--blue-dim:rgba(26,111,181,0.1);--blue-border:rgba(26,111,181,0.22);
  --r:18px;--rs:12px;--rx:8px;
  --nh:54px;--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;background:#fff;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
#app{height:100%;position:relative;background:var(--bg)}

/* SCREEN */
.screen{position:absolute;top:0;left:0;right:0;bottom:calc(var(--nh) + var(--sab));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{display:none}
.screen.noscroll{overflow:hidden}

/* NAV */
nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nh) + var(--sab));background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid rgba(0,0,0,0.1);display:flex;align-items:flex-start;padding-bottom:var(--sab);z-index:100}
.nb{flex:1;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px 4px}
.nb i{font-size:21px;line-height:1}
.nb span{font-size:10px;font-weight:500}
.nb.on{color:var(--gold)}
.fab{position:absolute;right:16px;bottom:calc(var(--nh) + var(--sab) + 14px);width:50px;height:50px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;box-shadow:0 4px 16px rgba(180,120,20,0.35);z-index:101}

/* HEADER */
.hdr{padding:max(1.25rem,calc(var(--sat)+0.5rem)) 1rem .5rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px}
.logo em{color:var(--gold);font-style:normal}
.avbtn{background:none;border:2px solid var(--gold);cursor:pointer;width:40px;height:40px;border-radius:50%;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--gold);font-size:15px;font-family:'DM Sans',sans-serif}

/* CARD */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin:0 1rem .75rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cp{padding:1.25rem}

/* BTNS */
.btn{padding:10px 18px;border-radius:var(--rs);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.gold{background:var(--gold);color:#fff;border-color:transparent;font-weight:600}
.ib{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.pill.seen{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}
.pill.rm{background:transparent;color:var(--text3);border-color:transparent}

/* INPUT */
input{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rs);padding:13px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;width:100%}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--text3)}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.tgray{background:var(--surface3);color:var(--text3)}
.tgreen{background:var(--green-dim);color:var(--green)}
.tblue{background:var(--blue-dim);color:var(--blue)}

/* FILTER */
.ftabs{display:flex;gap:6px;padding:.25rem 1rem .6rem;overflow-x:auto}
.ftabs::-webkit-scrollbar{display:none}
.ft{padding:8px 18px;font-size:15px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500}
.ft.on{background:var(--text);color:#fff;border-color:transparent}

/* MOVIE ROW */
.mrow{display:flex;gap:13px;align-items:flex-start;padding:14px 1rem;border-bottom:0.5px solid var(--border);cursor:pointer}
.mrow:last-child{border-bottom:none}
.mrow:active{background:var(--surface2)}
.mposter{border-radius:9px;background:var(--surface3);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.mposter img{width:100%;height:100%;object-fit:cover}
.minfo{flex:1;min-width:0}
.mtitle{font-size:16px;font-weight:500;line-height:1.3}
.myear{font-weight:400;color:var(--text2);font-size:14px}
.msub{font-size:13px;color:var(--text2);margin-top:3px}
.macts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.mchev{color:var(--text3);font-size:16px;flex-shrink:0;align-self:center}

/* SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.sh{background:#fff;border-radius:22px 22px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;padding-bottom:max(1.5rem,var(--sab));box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.shdrag{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 0;flex-shrink:0}
.shhead{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem .75rem;flex-shrink:0}
.shtitle{font-size:17px;font-weight:500}
.shclose{width:40px;height:40px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.shbody{overflow-y:auto;flex:1;padding:0 1rem}
.shbody::-webkit-scrollbar{display:none}
.shacts{display:flex;gap:8px;flex-wrap:wrap;padding:1rem 1rem 0;flex-shrink:0}

/* SEARCH */
.swrap{display:flex;gap:8px;padding:.25rem 1rem .75rem;flex-shrink:0}
.sinput-wrap{position:relative;flex:1;min-width:0}
.sinput-wrap input{padding-right:40px}
.sclear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface3);border:none;border-radius:50%;width:24px;height:24px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:13px}
.ritem{display:flex;gap:11px;align-items:center;padding:10px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px}
.ritem:active{background:var(--surface2)}
.rposter{width:40px;height:60px;border-radius:7px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px}
.rposter img{width:100%;height:100%;object-fit:cover}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmeta{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.radd{width:32px;height:32px;border-radius:50%;background:var(--gold-dim);border:0.5px solid var(--gold-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);font-size:16px}

/* SWIPE */
.swipe-wrap{display:flex;flex-direction:column;align-items:center;padding:.5rem 1rem 0;touch-action:none;user-select:none}
.swipe-stage{position:relative;width:220px;height:300px;margin-bottom:.75rem}
.swipe-bg{position:absolute;inset:0;border-radius:16px;background:var(--surface);box-shadow:0 4px 16px rgba(0,0,0,.08);transform:scale(.93) translateY(10px);overflow:hidden;background:var(--surface3)}
.swipe-bg img,.swipe-bg-ph{width:100%;height:100%;object-fit:cover;display:block}
.swipe-bg-ph{display:flex;align-items:center;justify-content:center;font-size:52px}
.swipe-card{position:absolute;inset:0;border-radius:16px;background:var(--surface);box-shadow:0 8px 28px rgba(0,0,0,.12);cursor:grab;overflow:hidden}
.swipe-card img,.swipe-card-ph{width:100%;height:220px;object-fit:cover;display:block}
.swipe-card-ph{height:220px;display:flex;align-items:center;justify-content:center;font-size:60px;background:var(--surface3)}
.swipe-info{display:none}
.swipe-title{font-size:14px;font-weight:600;line-height:1.3}
.swipe-meta{font-size:12px;color:var(--text2);margin-top:2px}
.swipe-lbl{position:absolute;top:14px;padding:5px 12px;border-radius:20px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;z-index:5}
.lbl-yes{left:12px;background:#e2f5ec;color:var(--green);border:2px solid var(--green)}
.lbl-no{right:12px;background:#fde8e8;color:var(--red);border:2px solid var(--red)}
.swipe-btns{display:flex;gap:2.5rem;margin:.25rem 0 .5rem}
.sbtn{width:60px;height:60px;border-radius:50%;border:1px solid;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;background:none}
.sbtn:active{transform:scale(.88)}
.sbtn-no{color:var(--red);border-color:rgba(192,57,43,.25);background:#fde8e8}
.sbtn-yes{color:var(--green);border-color:rgba(26,122,74,.25);background:#e2f5ec}
.swipe-prog{width:160px;text-align:center}
.swipe-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:4px}
.swipe-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
.swipe-lbl-txt{font-size:11px;color:var(--text3)}

/* MOOD */
.mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.mbtn{padding:.875rem;border-radius:var(--rs);border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:5px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.mbtn.wide{grid-column:span 2}

/* MATCHES */
.match-item{animation:mIn .4s ease both}
@keyframes mIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* DISCOVER */
.drow{overflow-x:auto;display:flex;gap:12px;padding:.25rem 1rem .75rem}
.drow::-webkit-scrollbar{display:none}
.dcard{flex-shrink:0;width:130px;cursor:pointer}
.dcard:active{opacity:.8}
.dposter{width:130px;height:195px;border-radius:12px;overflow:hidden;background:var(--surface3);box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:32px}
.dposter img{width:100%;height:100%;object-fit:cover}
.dtitle{font-size:13px;font-weight:500;margin-top:6px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drating{font-size:12px;color:var(--text3);margin-top:2px}
.dadd{margin-top:5px;width:100%;padding:5px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;font-weight:500}
.dadd.added{background:var(--green-dim);color:var(--green);border-color:var(--green-border)}

/* AUTH */
.auth{position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(2.5rem,calc(var(--sat)+1rem)) 1.25rem 2rem;background:linear-gradient(160deg,#f8f9fc,#eef0f6)}
.alogo{font-family:'DM Serif Display',serif;font-size:52px;letter-spacing:-.5px;margin-bottom:.25rem}
.alogo em{color:var(--gold);font-style:normal}
.atag{color:var(--text3);font-size:14px;margin-bottom:2.5rem}
.acard{background:#fff;border:0.5px solid var(--border);border-radius:var(--r);padding:1.5rem;width:100%;max-width:400px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.atabs{display:flex;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
.atab{flex:1;padding:11px;background:none;border:none;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.atab.on{color:var(--gold);border-bottom-color:var(--gold)}
.afield{margin-bottom:1.1rem}
.afield label{font-size:14px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
.aerr{background:var(--red-dim);color:var(--red);border-radius:var(--rx);padding:11px 13px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.aok{background:var(--green-dim);color:var(--green);border-radius:var(--rx);padding:11px 13px;font-size:13px;margin-bottom:1rem}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1rem}
.sbox{background:var(--surface2);padding:.875rem .5rem;border-radius:var(--rs);text-align:center;border:0.5px solid var(--border)}
.sn{font-size:26px;font-weight:600;line-height:1}
.sl{font-size:11px;color:var(--text2);margin-top:4px}

/* MISC */
.av{border-radius:50%;background:var(--gold-dim);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--gold);flex-shrink:0}
.empty{text-align:center;padding:3rem 1rem 2rem;color:var(--text3)}
.empty i{font-size:38px;display:block;margin-bottom:10px;opacity:.3}
.empty p{font-size:14px;line-height:1.6}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.lrow{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:12px 0}
.toast{position:fixed;bottom:calc(var(--nh) + var(--sab) + 14px);left:50%;transform:translateX(-50%);background:#1a1a24;border-radius:20px;padding:10px 20px;font-size:13px;color:#f0f0f0;z-index:500;pointer-events:none;opacity:0;transition:opacity .22s;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.ptog{display:flex;gap:6px;margin-bottom:1rem}
.ptog button{flex:1;padding:9px;border-radius:var(--rs);border:0.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
.ptog button.on{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
.sh2{height:85vh}
.shead{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem .3rem}
.stitle{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}
</style>
</head>

function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),3000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// AUTH
async function signUp(email,pass,username){
  S.aLoading=true;S.aErr='';render();
  const{data:ex}=await sb.from('profiles').select('id').eq('username',username).maybeSingle();
  if(ex){S.aErr='Username taken';S.aLoading=false;render();return;}
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username}}});
  if(error){S.aErr=error.message;S.aLoading=false;render();return;}
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,username},{onConflict:'id'});
    const{data:sd,error:se}=await sb.auth.signInWithPassword({email,password:pass});
    if(!se&&sd.user){S.user=sd.user;S.profile={id:sd.user.id,username};await loadAll();S.aLoading=false;render();toast('Welcome!');return;}
  }
  S.aOk='Account created! Sign in.';S.authTab='login';S.aLoading=false;render();
}

async function loadRequests(){

    .select('*,from:profiles!partner_requests_from_id_fkey(id,username),to:profiles!partner_requests_to_id_fkey(id,username)')

async function onPInput(){
  const el=document.getElementById('pInput');

  clearTimeout(_pTimer);
  if(!q){S.pResult=null;S.pMsg='';S.userSuggestions=[];render();return;}
  _pTimer=setTimeout(async()=>{
    // Search case-insensitive - try both ilike and contains
    const{data,error}=await sb.from('profiles')
      .select('id,username')
      .neq('id',S.user.id)
      .or(`username.ilike.${q}%,username.ilike.%${q}%`)
      .limit(8);

    S.userSuggestions=data||[];

}

async function doSearch(){
  const el=document.getElementById('sInput');const q=(el?el.value:'').trim();
  const rEl=document.getElementById('sResults');
  if(!q){if(rEl)rEl.innerHTML='<p style="font-size:13px;color:var(--text3);padding:8px 0">Start typing to search</p>';return;}
  if(rEl)rEl.innerHTML='<div class="lrow"><div class="spin"></div> Searching...</div>';
  try{
    const r=await fetch(`${TBASE}/search/movie?api_key=${TMDB}&query=${encodeURIComponent(q)}&language=en-US`);
    const d=await r.json();
    const res=(d.results||[]).slice(0,8).map(m=>({id:String(m.id),title:m.title,year:m.release_date?m.release_date.slice(0,4):'?',poster_path:m.poster_path||null,imdb_rating:m.vote_average?parseFloat(m.vote_average.toFixed(1)):null,plot:m.overview||'',genre:null,director:null,runtime:null}));
    window._sr=res;
    const rEl2=document.getElementById('sResults');if(!rEl2)return;
    if(!res.length){rEl2.innerHTML='<p style="font-size:13px;color:var(--text3);padding:10px 0">No results</p>';return;}
    rEl2.innerHTML=res.map((m,i)=>`<div class="ritem" onclick="addByIdx(${i})">
      <div class="rposter">${m.poster_path?`<img src="https://image.tmdb.org/t/p/w92${esc(m.poster_path)}" loading="lazy">`:'🎬'}</div>
      <div class="rinfo"><div class="rtitle">${esc(m.title)} <span style="font-weight:400;color:var(--text2)">(${esc(m.year)})</span></div>
      <div class="rmeta">${m.imdb_rating?'★ '+m.imdb_rating+'  ':''}${esc((m.plot||'').slice(0,55))}${(m.plot||'').length>55?'...':''}</div></div>
      <div class="radd" id="radd${i}"><i class="ti ti-plus"></i></div>
    </div>`).join('');
  }catch(e){const rEl2=document.getElementById('sResults');if(rEl2)rEl2.innerHTML='<p style="font-size:13px;color:var(--red);padding:10px 0">Search failed</p>';}
}

async function fetchDetails(id){
  try{
    const r=await fetch(`${TBASE}/movie/${id}?api_key=${TMDB}&append_to_response=credits`);
    const d=await r.json();
    const dir=(d.credits?.crew||[]).find(c=>c.job==='Director');
    return{id:String(d.id),title:d.title,year:d.release_date?d.release_date.slice(0,4):'?',director:dir?dir.name:null,genre:d.genres?.[0]?.name||null,runtime:d.runtime?d.runtime+'m':null,imdb_rating:d.vote_average?parseFloat(d.vote_average.toFixed(1)):null,plot:d.overview||'',poster_path:d.poster_path||null};
  }catch(e){return null;}
}

async function addMovie(movie){
  if(_addBusy){toast('Please wait...');return;}
  if(S.myMovies.find(w=>w.movie_id===String(movie.id))){toast('Already in your list');return;}
  _addBusy=true;toast('Adding...');
  try{
    const full=await fetchDetails(movie.id);const m=full||movie;const fid=String(m.id);
    const{error:me}=await sb.from('movies').upsert({id:fid,title:m.title,year:m.year,director:m.director,genre:m.genre,runtime:m.runtime,imdb_rating:m.imdb_rating,plot:m.plot,poster_path:m.poster_path},{onConflict:'id'});
    if(me){toast('Error: '+me.message);return;}
    const{data:ex}=await sb.from('watchlist').select('id').eq('user_id',S.user.id).eq('movie_id',fid).maybeSingle();
    if(ex){toast('Already in your list');return;}
    const{error:we}=await sb.from('watchlist').insert({user_id:S.user.id,movie_id:fid});
    if(we){toast('Error: '+we.message);return;}
    await loadMyMovies();toast(m.title+' added!');
  }catch(e){toast('Error: '+e.message);}finally{_addBusy=false;}
}

// SWIPE LOGIC
function pool(mood){
  const all=allMovies();
  if(mood==='random10')return all;
  if(mood==='tonight'){
    if(!S.tonightPicks||!S.tonightPicks.size)return all;
    return all.filter(w=>S.tonightPicks.has(w.movie_id));
  }
  const g=mood&&mood!=='any'?GENRES[mood]:null;
  if(!g)return all;
  return all.filter(w=>{const genre=w.movie?.genre||'';return g.some(x=>genre.toLowerCase().includes(x.toLowerCase()));});
}
function startSwipe(mood){
  if(mood==='tonight'&&(!S.tonightPicks||!S.tonightPicks.size)){
    // Show picker first
    S.showTonightPicker=true;S.mood=mood;render();return;
  }
  S.mood=mood;
  let p=pool(mood).filter(w=>S.mySwipes[w.movie_id]===undefined);
  if(!p.length){S.mySwipes={};S.pSwipes={};p=pool(mood);if(!p.length){toast('No movies match');return;}toast('All swiped — starting fresh!');}
  // Shuffle first, then pick 10 for random mode
  const shuffled=[...p].sort(()=>Math.random()-.5);
  S.queue=mood==='random10'?shuffled.slice(0,10):shuffled;
  S.qi=0;S.swiping=true;
  // Preload all images upfront before showing swipe
  const toPreload=S.queue.slice(0,Math.min(S.queue.length,10));
  let loaded=0;
  const total=toPreload.filter(w=>w.movie?.poster_path).length;
  if(total===0){render();setTimeout(attachSwipe,100);return;}
  toPreload.forEach(w=>{
    if(!w.movie?.poster_path){return;}
    const img=new Image();
    img.onload=img.onerror=function(){
      loaded++;
      if(loaded>=Math.min(2,total)){render();setTimeout(attachSwipe,100);}
    };
    img.src='https://image.tmdb.org/t/p/w342'+w.movie.poster_path;
  });
}
async function doSwipe(mid,liked){
  S.lastSwipe={mid,liked,qi:S.qi,who:'me'};
  if(S.playlist)await sb.from('swipes').upsert({playlist_id:S.playlist.id,user_id:S.user.id,movie_id:mid,liked},{onConflict:'playlist_id,user_id,movie_id'});
  S.mySwipes[mid]=liked;S.qi++;
  // Preload next 2 images immediately
  [S.queue[S.qi],S.queue[S.qi+1]].forEach(w=>{
    if(w?.movie?.poster_path){const img=new Image();img.src='https://image.tmdb.org/t/p/w342'+w.movie.poster_path;}
  });
  render();setTimeout(attachSwipe,100);
}

function getMatches(){

}

// SWIPE - works in Safari and Chrome, home screen and browser
function initCard(cardId, labelYId, labelNId, onSwipe){
  const card=document.getElementById(cardId);
  if(!card||card._pi)return;
  card._pi=true;
  const ly=document.getElementById(labelYId);
  const ln=document.getElementById(labelNId);
  const mid=card.dataset.mid;
  let sx=0,dx=0,active=false;

  function paint(){
    card.style.transform='translateX('+dx+'px) rotate('+(dx*0.04)+'deg)';
    var p=Math.min(Math.abs(dx)/100,1);
    if(dx>15){card.style.boxShadow='0 8px 40px rgba(26,122,74,'+(p*0.6)+')';if(ly)ly.style.opacity=Math.min(1,(dx-15)/55)+'';if(ln)ln.style.opacity='0';}
    else if(dx<-15){card.style.boxShadow='0 8px 40px rgba(192,57,43,'+(p*0.6)+')';if(ln)ln.style.opacity=Math.min(1,(-dx-15)/55)+'';if(ly)ly.style.opacity='0';}
    else{card.style.boxShadow='';if(ly)ly.style.opacity='0';if(ln)ln.style.opacity='0';}
  }
  function settle(){
    card.style.transition='transform .25s ease-out,opacity .25s,box-shadow .2s';
    if(dx>65){card.style.transform='translateX(160%) rotate(12deg)';card.style.opacity='0';setTimeout(function(){onSwipe(mid,true);},250);}
    else if(dx<-65){card.style.transform='translateX(-160%) rotate(-12deg)';card.style.opacity='0';setTimeout(function(){onSwipe(mid,false);},250);}
    else{card.style.transition='transform .2s ease-out';card.style.transform='';card.style.boxShadow='';if(ly)ly.style.opacity='0';if(ln)ln.style.opacity='0';}
  }

  // Touch events (most reliable in Safari)
  var startY=0,startTime=0;
  card.addEventListener('touchstart',function(e){active=true;sx=e.touches[0].clientX;startY=e.touches[0].clientY;startTime=Date.now();dx=0;card.style.transition='none';},{passive:true});
  card.addEventListener('touchmove',function(e){if(!active)return;var ndx=e.touches[0].clientX-sx;if(Math.abs(ndx)<5)return;e.preventDefault();dx=ndx;paint();},{passive:false});
  card.addEventListener('touchend',function(e){
    if(!active)return;active=false;
    // If barely moved and quick — it's a tap, show detail
    var elapsed=Date.now()-startTime;
    if(Math.abs(dx)<10&&elapsed<300){
      card.style.transform='';card.style.boxShadow='';
      if(ly)ly.style.opacity='0';if(ln)ln.style.opacity='0';
      showSwipeDetail(mid);return;
    }
    settle();
  },{passive:true});
  card.addEventListener('touchcancel',function(){active=false;card.style.transition='transform .3s';card.style.transform='';card.style.boxShadow='';if(ly)ly.style.opacity='0';if(ln)ln.style.opacity='0';},{passive:true});

  // Pointer events for desktop/fallback
  card.addEventListener('pointerdown',function(e){if(e.pointerType==='touch')return;active=true;sx=e.clientX;dx=0;card.setPointerCapture(e.pointerId);card.style.transition='none';});
  card.addEventListener('pointermove',function(e){if(e.pointerType==='touch'||!active)return;dx=e.clientX-sx;paint();});
  card.addEventListener('pointerup',function(e){if(e.pointerType==='touch'||!active)return;active=false;settle();});
}

function attachSwipe(){
  initCard('SC','SCLY','SCLN',doSwipe);
  initCard('SCP','SCPLY','SCPLN',doPartnerSwipe);
}

      fetch(`${TBASE}/discover/movie?api_key=${TMDB}&sort_by=vote_average.desc&vote_count.gte=5000&with_genres=28&language=en-US`),
      fetch(`${TBASE}/discover/movie?api_key=${TMDB}&sort_by=vote_average.desc&vote_count.gte=2000&with_genres=878&language=en-US`),
    ];
    const jsons=await Promise.all(reqs.map(r=>r.then(x=>x.json())));
    S.discover={
      'Best of 2026':(jsons[0].results||[]).slice(0,10),
      'Best of 2025':(jsons[1].results||[]).slice(0,10),
      'Best of 2024':(jsons[2].results||[]).slice(0,10),
      'Top Drama':(jsons[3].results||[]).slice(0,10),
      'Top Action':(jsons[4].results||[]).slice(0,10),
      'Top Sci-Fi':(jsons[5].results||[]).slice(0,10),
    };
    if(S.myMovies.length>0){
      const pick=S.myMovies[Math.floor(Math.random()*Math.min(S.myMovies.length,5))];
      const r=await fetch(`${TBASE}/movie/${pick.movie_id}/recommendations?api_key=${TMDB}&language=en-US`);
      const d=await r.json();
      if(d.results?.length)S.discover['For You']=(d.results||[]).slice(0,10);
    }
  }catch(e){console.error(e);}
  S.dLoading=false;render();
}

      all.map(w=>{
        const m=w.movie||{};const mid=w.movie_id;const sel=S.tonightPicks.has(mid);
        return`<div class="mrow" onclick="toggleTonightPick('${mid}')" style="background:${sel?'rgba(201,150,42,0.08)':''}">
          <div class="mposter" style="width:44px;height:64px">${m.poster_path?`<img src="https://image.tmdb.org/t/p/w92${esc(m.poster_path)}" style="width:100%;height:100%;object-fit:cover" loading="lazy">`:'🎬'}</div>
          <div class="minfo">
            <div class="mtitle" style="font-size:15px">${esc(m.title||'')} <span class="myear">(${esc(m.year||'')})</span></div>
            <div class="msub">${esc(m.genre||'')}${m.imdb_rating?' · ★'+m.imdb_rating:''}</div>
          </div>
          <div style="width:28px;height:28px;border-radius:50%;border:2px solid ${sel?'var(--gold)':'var(--border2)'};background:${sel?'var(--gold)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:14px">
            ${sel?'<i class="ti ti-check"></i>':''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  if(!S.swiping){
    const ap=allMovies();
    return`
    <div class="hdr"><div class="logo">Cine<em>Pair</em></div></div>
    <div class="shead"><span class="stitle">What are you in the mood for?</span></div>
    <div style="padding:0 1rem">
      ${ap.length===0?`<div class="empty"><i class="ti ti-movie-off"></i><p>Add movies first</p></div>`:`
      <div class="mood-grid">${MOODS.map(mood=>{const cnt=pool(mood.id).length;return`<button class="mbtn ${mood.wide?'wide':''}" onclick="startSwipe('${mood.id}')">
        <i class="ti ${mood.icon}" style="font-size:22px;color:var(--gold)"></i>
        <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-weight:600">${mood.label}</span><span style="font-size:12px;color:var(--text3)">${mood.id==='random10'?Math.min(10,cnt):mood.id==='tonight'?(S.tonightPicks?.size||0)||'tap to pick':cnt}</span></div>
        <div style="font-size:12px;color:var(--text3)">${mood.desc}</div>
      </button>`;}).join('')}</div>`}
      ${matches.length>0?`
        <div style="font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.6px;margin:1rem 0 .75rem">🎉 Previous matches</div>
        <div class="card" style="border:1.5px solid var(--green-border);background:rgba(26,122,74,0.04);margin:0 0 .75rem">
          ${matches.map((m,i)=>`<div class="mrow match-item" style="animation-delay:${i*80}ms" onclick="openDetail('${m.movie_id}')">
            <div class="mposter" style="width:56px;height:82px">${pimg(m.movie?.poster_path,56,82,'w92')}</div>
            <div class="minfo"><div class="mtitle">${esc(m.movie?.title||'')} <span class="myear">(${esc(m.movie?.year||'')})</span></div>
            <div class="tags"><span class="tag tgreen">✓ Both swiped right</span></div></div>
            <i class="ti ti-chevron-right" style="color:var(--green);font-size:18px;flex-shrink:0;align-self:center"></i>
          </div>`).join('')}
        </div>`:''}
      <div style="text-align:center;padding-bottom:1.5rem"><button class="btn" style="color:var(--red);font-size:13px" onclick="resetSwipes()"><i class="ti ti-rotate"></i> Reset swipes</button></div>
    </div>`;
  }

  const moodLabel=MOODS.find(m=>m.id===S.mood)?.label||'Movies';
  return`
    <div class="hdr">
      <button onclick="S.swiping=false;render()" style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--gold);font-family:DM Sans,sans-serif;font-size:15px;font-weight:500;padding:0"><i class="ti ti-chevron-left" style="font-size:22px"></i> Moods</button>
      <div class="logo">Cine<em>Pair</em></div>
      <div style="width:80px"></div>
    </div>
    <div class="shead"><span class="stitle">${moodLabel}</span><span style="font-size:12px;color:var(--text3)">${S.queue.length} movies</span></div>
    <div class="card cp">
      <div class="ptog">
        <button class="${!S.pview?'on':''}" onclick="setPView(false)">My swipes</button>
        <button class="${S.pview?'on':''}" onclick="setPView(true)">${esc(pn)}'s swipes</button>
      </div>
      ${!S.pview?`
        ${!myDone&&cur?swipeCardHTML(cur,nxt,false,S.qi,S.queue.length,''):`
          <div class="empty" style="padding:1.5rem 0"><i class="ti ti-check" style="color:var(--green)"></i><p>Your swipes done!<br><span style="font-size:12px;color:var(--text3)">Switch to ${esc(pn)}'s tab</span></p></div>
          <div style="text-align:center;display:flex;gap:10px;justify-content:center">
            <button class="btn" onclick="startSwipe(S.mood)"><i class="ti ti-refresh"></i> Swipe unseen</button>
            <button class="btn" style="color:var(--red)" onclick="resetSwipes()"><i class="ti ti-rotate"></i> Reset</button>
          </div>`}
      `:`
        ${pUnswiped.length===0?`<div class="empty" style="padding:1.5rem 0"><i class="ti ti-check" style="color:var(--green)"></i><p>${esc(pn)} is done!</p></div>`:
        swipeCardHTML(pUnswiped[0],pUnswiped[1],true,S.queue.length-pUnswiped.length,S.queue.length,hp?'Ask '+esc(pn)+' to open CinePair':'Pass the phone to '+esc(pn))}
      `}
    </div>
    ${matches.length>0?`
      <div class="shead">
        <span class="stitle" style="color:var(--green)">🎉 Matches!</span>
        ${matches.length>1?`<button class="btn" style="padding:5px 12px;font-size:12px;background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)" onclick="randomPick()"><i class="ti ti-dice"></i> Pick random</button>`:`<span style="font-size:12px;color:var(--text3)">${matches.length}</span>`}
      </div>
      <div class="card" style="border:1.5px solid var(--green-border);background:rgba(26,122,74,0.04);margin-bottom:1.5rem">
        ${matches.map((m,i)=>`<div class="mrow match-item" style="animation-delay:${i*80}ms" onclick="openDetail('${m.movie_id}')">
          <div class="mposter" style="width:56px;height:82px">${pimg(m.movie?.poster_path,56,82,'w92')}</div>
          <div class="minfo"><div class="mtitle">${esc(m.movie?.title||'')} <span class="myear">(${esc(m.movie?.year||'')})</span></div>
          <div class="msub">${esc(m.movie?.director||'')}${m.movie?.imdb_rating?' · ★'+m.movie.imdb_rating:''}</div>
          <div class="tags"><span class="tag tgreen">✓ Both swiped right</span></div></div>
          <i class="ti ti-chevron-right" style="color:var(--green);font-size:18px;flex-shrink:0;align-self:center"></i>
        </div>`).join('')}
      </div>`:''}`;
}

function renderDiscover(){
  const keys=Object.keys(S.discover);
  return`
    <div class="hdr"><div class="logo">Cine<em>Pair</em></div></div>
    ${S.dLoading&&!keys.length?`<div style="padding:2rem;text-align:center;color:var(--text3)"><div class="spin" style="width:24px;height:24px;margin:0 auto 12px"></div>Loading...</div>`:''}
    ${keys.map((sec,si)=>`
      <div class="shead"><span class="stitle">${esc(sec)}</span>
        <button id="loadmore-${esc(sec)}" onclick="loadMoreDiscover('${esc(sec)}',${2})" style="font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:DM Sans,sans-serif">Load more</button>
      </div>
      <div class="drow" id="drow-${esc(sec)}">${(S.discover[sec]||[]).map(m=>{
        const added=S.myMovies.find(w=>w.movie_id===String(m.id));
        const bid='db'+m.id;
        return`<div class="dcard" onclick="openDiscoverDetail(${m.id},'${esc((m.title||m.name||'').replace(/'/g,"\'"))}','${esc((m.overview||'').slice(0,200).replace(/'/g,"\'"))}','${esc(m.poster_path||'')}','${m.vote_average?m.vote_average.toFixed(1):'?'}','${esc((m.release_date||'').slice(0,4))}')">
          <div class="dposter">${m.poster_path?`<img src="https://image.tmdb.org/t/p/w185${esc(m.poster_path)}" loading="lazy" style="width:100%;height:100%;object-fit:cover">`:'🎬'}</div>
          <div class="dtitle">${esc(m.title||m.name||'')}</div>
          <div class="drating">★ ${m.vote_average?m.vote_average.toFixed(1):'?'}</div>
          <button class="dadd${added?' added':''}" id="${bid}" onclick="event.stopPropagation();addDiscover(${m.id},'${bid}')">${added?'✓ Added':'+ Add'}</button>
        </div>`;}).join('')}</div>`).join('')}
    ${!keys.length&&!S.dLoading?`<div class="empty"><i class="ti ti-compass"></i><p>Loading recommendations...</p></div>`:''}`;
}

function renderProfile(){
  const hp=!!(S.playlist?.partner_id);
  const pn=S.playlist?(S.playlist.owner_id===S.user.id?S.playlist.partner?.username:S.playlist.owner?.username):null;
  return`
    <div class="hdr"><div class="logo">Cine<em>Pair</em></div></div>
    <div class="card cp" style="margin-top:.5rem">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:1.25rem">
        <div class="av" style="width:54px;height:54px;font-size:20px">${(S.profile?.username||'?')[0].toUpperCase()}</div>
        <div>
          <div style="font-size:22px;font-weight:600">@${esc(S.profile?.username||'')}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;background:var(--surface2);padding:3px 10px;border-radius:20px;display:inline-block">Share username with your partner</div>
        </div>
      </div>
      <div class="stats">
        <div class="sbox"><div class="sn">${S.myMovies.length}</div><div class="sl">My movies</div></div>
        <div class="sbox"><div class="sn">${S.myMovies.filter(w=>w.watched).length}</div><div class="sl">Watched</div></div>
        <div class="sbox"><div class="sn">${getMatches().length}</div><div class="sl">Matches</div></div>
      </div>
    </div>
    <div class="card cp">
      <div style="font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--text3);text-transform:uppercase;margin-bottom:.75rem">Partner</div>
      ${hp?`<div style="display:flex;align-items:center;gap:12px">
        <div class="av" style="width:38px;height:38px;font-size:14px">${(pn||'?')[0].toUpperCase()}</div>
        <div><div style="font-weight:500">@${esc(pn||'')}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Connected · ${S.partnerMovies.length} movies</div></div>
      </div>
      <button class="btn" style="font-size:12px;padding:6px 12px;color:var(--red);border-color:var(--red-border);margin-top:.75rem" onclick="disconnectPartner()"><i class="ti ti-unlink"></i> Disconnect partner</button>`:S.playlist?`
        <p style="font-size:13px;color:var(--text2);margin-bottom:.75rem">Single phone mode.</p>
        <div style="display:flex;gap:8px;margin-bottom:.75rem">
          <input type="text" id="pnInput" value="${esc(S.pName)}" placeholder="Partner name...">
          <button class="btn gold" style="padding:8px 14px;font-size:13px;flex-shrink:0" onclick="savePName()">Save</button>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn" style="font-size:13px;flex:1" onclick="openModal('partner')"><i class="ti ti-user-plus"></i> Connect partner account</button>
          <button class="btn" style="font-size:13px;color:var(--red);border-color:var(--red-border)" onclick="disconnectPartner()"><i class="ti ti-unlink"></i> Reset</button>
        </div>
      `:`<p style="font-size:13px;color:var(--text2);margin-bottom:.75rem">No partner connected.</p>
      <button class="btn gold" style="font-size:13px" onclick="openModal('partner')"><i class="ti ti-user-plus"></i> Connect partner</button>`}
    </div>
    <div style="padding:0 1rem .5rem">
      <button class="btn gold" style="width:100%;justify-content:center;margin-bottom:.75rem" onclick="shareApp()"><i class="ti ti-share"></i> Share CinePair with partner</button>
      <a href="mailto:info@cinepair.com?subject=CinePair Feedback" style="display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px 18px;border-radius:var(--rs);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:DM Sans,sans-serif;font-size:14px;font-weight:500;text-decoration:none;margin-bottom:.75rem"><i class="ti ti-mail"></i> Contact us</a>
      <button class="btn" style="width:100%;justify-content:center" onclick="doSignOut()"><i class="ti ti-logout"></i> Sign out</button>
    </div>`;
}
function savePName(){const e=document.getElementById('pnInput');if(e&&e.value.trim()){S.pName=e.value.trim();toast('Saved!');render();}}

function renderAddModal(){
  return`<div class="ov">
    <div class="sh sh2" onclick="event.stopPropagation()">
      <div class="shdrag"></div>
      <div class="shhead"><div class="shtitle">Search movies</div>
        <button class="shclose" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="swrap">
        <div class="sinput-wrap">
          <input type="text" id="sInput" placeholder="Movie title..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSInput()" onkeydown="if(event.key==='Enter'){clearTimeout(_sTimer);doSearch()}">
          <button onclick="clearS()" id="sClear" class="sclear"><i class="ti ti-x"></i></button>
        </div>
      </div>
      <div class="shbody" id="sResults"><p style="font-size:13px;color:var(--text3);padding:8px 0">Start typing to search</p></div>
    </div>
  </div>`;
}

function renderPartnerModal(){
  const pendingSent=S.requests.filter(r=>r.from_id===S.user.id);
  return`<div class="ov">
    <div class="sh sh2" onclick="event.stopPropagation()">
      <div class="shdrag"></div>
      <div class="shhead"><div class="shtitle">Connect partner</div>
        <button class="shclose" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="shbody">
        <p style="font-size:14px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Search by username — your partner needs a CinePair account.</p>
        <input type="text" id="pInput" placeholder="Start typing username..." value="${esc(S.pq)}" oninput="onPInput()" autocomplete="off" autocorrect="off" spellcheck="false" style="margin-bottom:.75rem">
        ${S.pMsg?`<div class="aerr">${esc(S.pMsg)}</div>`:''}
        ${(S.userSuggestions||[]).length>0?`
          <div style="border:0.5px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:1rem">
            ${S.userSuggestions.map(u=>{
              const alreadySent=S.requests.find(r=>r.from_id===S.user.id&&r.to_id===u.id);
              return`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--border);background:var(--surface)">
                <div style="display:flex;align-items:center;gap:10px">
                  <div class="av" style="width:36px;height:36px;font-size:14px">${u.username[0].toUpperCase()}</div>
                  <div style="font-weight:500">@${esc(u.username)}</div>
                </div>
                ${alreadySent
                  ?`<span style="font-size:12px;color:var(--text3);padding:6px 12px;background:var(--surface2);border-radius:20px">Request sent</span>`
                  :S.playlist
                  ?`<span style="font-size:12px;color:var(--text3)">Already connected</span>`
                  :`<button class="btn gold" style="padding:7px 14px;font-size:13px" onclick="sendRequest('${u.id}')">Send request</button>`
                }
              </div>`;
            }).join('')}
          </div>
        `:S.pq.length>0&&!S.pMsg?`<p style="font-size:13px;color:var(--text3);margin-bottom:1rem">No users found matching "${esc(S.pq)}"</p>`:''}
        ${pendingSent.length>0?`
          <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem">Pending requests</div>
          ${pendingSent.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:var(--rs);margin-bottom:.5rem">
            <div style="display:flex;align-items:center;gap:8px">
              <div class="av" style="width:30px;height:30px;font-size:12px">${r.to?.username?.[0]?.toUpperCase()||'?'}</div>
              <span style="font-size:14px;font-weight:500">@${esc(r.to?.username||'')}</span>
            </div>
            <span style="font-size:12px;color:var(--text3)">Waiting...</span>
          </div>`).join('')}
        `:''}
      </div>
    </div>
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=renderAuth();hideSplash();return;}
  const tabs=[
    {id:'my',icon:'ti-list',label:'My list'},
    {id:'partner',icon:'ti-user-heart',label:'Partner'},
    {id:'swipe',icon:'ti-cards',label:'Swipe'},
    {id:'discover',icon:'ti-compass',label:'Discover'},
    {id:'profile',icon:'ti-user',label:'Profile'},
  ];
  let content='';
  if(S.tab==='my')content=renderMy();
  else if(S.tab==='partner')content=renderPartner();
  else if(S.tab==='swipe')content=renderSwipe();
  else if(S.tab==='discover')content=renderDiscover();
  else content=renderProfile();
  const navHTML=`<nav>${tabs.map(t=>`<button class="nb ${S.tab===t.id?'on':''}" onclick="setTab('${t.id}')" style="position:relative">
  <i class="ti ${t.icon}"></i>
  ${t.id==='partner'&&S.incomingRequests?.length>0?`<span style="position:absolute;top:5px;right:calc(50% - 18px);width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid #fff"></span>`:''}
  <span>${t.label}</span>
</button>`).join('')}</nav>${S.tab==='my'?`<button class="fab" onclick="openModal('add')"><i class="ti ti-plus"></i></button>`:''}`;
  const modal=S.modal==='add'?renderAddModal():S.modal==='partner'?renderPartnerModal():'';
  const detail=S.detail?renderDetail():'';
  const swipeDetailHTML=S.swipeDetail?renderSwipeDetail():'';
  // Disable scroll when swiping to prevent touch conflict
  const ns=S.tab==='swipe'&&S.swiping&&!S.modal?'noscroll':'';
  app.innerHTML=`<div class="screen ${ns}">${content}</div>${navHTML}${modal}${detail}${swipeDetailHTML}`;
  hideSplash();
  if(S.modal==='add')setTimeout(()=>document.getElementById('sInput')?.focus(),80);
  if(S.modal==='partner')setTimeout(()=>document.getElementById('pInput')?.focus(),80);
  if(S.tab==='swipe'&&S.swiping)setTimeout(attachSwipe,100);
}

// GLOBALS
window.undoSwipe=undoSwipe;
window.closeSwipeDetail=closeSwipeDetail;
window.toggleTonightPick=toggleTonightPick;
window.disconnectPartner=disconnectPartner;
window.startTonightSwipe=startTonightSwipe;
window.showSwipeDetail=showSwipeDetail;
window.sendRequest=sendRequest;
window.acceptRequest=acceptRequest;
window.declineRequest=declineRequest;
window.onPInput=onPInput;
window.setTab=function(t){S.tab=t;if(t==='discover'&&!Object.keys(S.discover).length)loadDiscover();render();};
window.setFilter=f=>{S.filter=f;render();};
window.setATab=t=>{S.authTab=t;S.aErr='';S.aOk='';render();};
window.setPView=v=>{S.pview=v;render();if(S.swiping)setTimeout(attachSwipe,100);};
window.openModal=m=>{S.modal=m;render();};
window.closeModal=()=>{S.modal=null;render();};
window.openDetail=openDetail;
window.doSearch=doSearch;window.onSInput=onSInput;window.clearS=clearS;
window.findPartner=findPartner;window.connectPartner=connectPartner;window.soloSetup=soloSetup;
window.doSignOut=signOut;
window.startSwipe=startSwipe;window.resetSwipes=resetSwipes;
window.addMovie=addMovie;window.toggleWatched=toggleWatched;window.removeMovie=removeMovie;
window.savePName=savePName;
window.shareApp=async function(){
  const text='Join me on CinePair!\n\nMy username: @'+(S.profile?.username||'')+'\n\ncinepair.com';
  if(navigator.share){try{await navigator.share({title:'CinePair',text,url:'https://cinepair.com'});}catch(e){}}
  else{navigator.clipboard?.writeText(text).then(()=>toast('Copied!'));}
};
window.doSignIn=()=>{
  const e=document.getElementById('aE')?.value;const p=document.getElementById('aP')?.value;
  if(!e||!p){S.aErr='Please fill all fields';render();return;}signIn(e,p);
};
window.doSignUp=()=>{
  const u=document.getElementById('aU')?.value?.trim();const e=document.getElementById('aE')?.value;const p=document.getElementById('aP')?.value;
  if(!u||!e||!p){S.aErr='Please fill all fields';render();return;}
  if(u.length<3){S.aErr='Username must be at least 3 characters';render();return;}
  signUp(e,p,u);
};

(async()=>{
  setTimeout(hideSplash,5000);
  // Show auth screen immediately without waiting for session
  render();
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){S.user=session.user;await loadProfile();render();}
  // Poll for incoming partner requests every 30 seconds
  setInterval(async()=>{
    if(!S.user)return;
    const prevCount=S.incomingRequests?.length||0;
    await loadRequests();
    if((S.incomingRequests?.length||0)!==prevCount)render();
  },30000);
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user&&!S.user){S.user=session.user;await loadProfile();render();}
    else if(event==='SIGNED_OUT'){S.user=null;S.profile=null;render();}
  });
})();
</script>
<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
